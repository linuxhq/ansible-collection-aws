---
- name: Ensure information about aws relational database service instances is gathered
  tags:
    - rds_instance_info
  amazon.aws.rds_instance_info:
    db_instance_identifier: "{{ rds_instance_info_db_instance_identifier or omit }}"
    filters: "{{ rds_instance_info_filters }}"
    validate_certs: true
  register: __rds_instance_info_query

- name: Ensure list of aws relational database service instances is generated
  tags:
    - rds_instance_info
  ansible.builtin.set_fact:
    _rds_instance_info_list:
      "{{ (__rds_instance_info_query.instances |
          selectattr('db_instance_identifier', 'defined')) |
          d([]) }}"

- name: Ensure dict of aws relational database service instances is generated
  tags:
    - rds_instance_info
  ansible.builtin.set_fact:
    _rds_instance_info_dict:
      "{{ dict(_rds_instance_info_list |
               json_query('[].db_instance_identifier') |
               zip(_rds_instance_info_list)) }}"
...
