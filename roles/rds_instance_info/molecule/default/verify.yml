---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - aws_caller_info
    - ec2_security_group_info
    - ec2_vpc_net_info
    - ec2_vpc_subnet_info
    - rds_instance_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _rds_instance_info_dict['mariadb106'].allocated_storage ==
              rds_instance_list.0.allocated_storage
          - _rds_instance_info_dict['mariadb106'].db_instance_class ==
              rds_instance_list.0.db_instance_class
          - _rds_instance_info_dict['mariadb106'].db_subnet_group.db_subnet_group_name ==
              rds_instance_list.0.db_subnet_group_name
          - _rds_instance_info_dict['mariadb106'].db_subnet_group.subnets.0.subnet_identifier ==
              rds_subnet_group_list.0.subnets.0
          - _rds_instance_info_dict['mariadb106'].db_subnet_group.subnets.1.subnet_identifier ==
              rds_subnet_group_list.0.subnets.1
          - _rds_instance_info_dict['mariadb106'].endpoint.address is defined
          - _rds_instance_info_dict['mariadb106'].endpoint.port is defined
          - _rds_instance_info_dict['mariadb106'].engine ==
              rds_instance_list.0.engine
          - _rds_instance_info_dict['mariadb106'].engine_version ==
              rds_instance_list.0.engine_version
          - _rds_instance_info_dict['mariadb106'].iam_database_authentication_enabled == false
          - _rds_instance_info_dict['mariadb106'].master_username ==
              rds_instance_list.0.master_username
          - _rds_instance_info_dict['mariadb106'].multi_az == false
          - _rds_instance_info_dict['mariadb106'].publicly_accessible ==
              rds_instance_list.0.publicly_accessible
          - _rds_instance_info_dict['mariadb118'].allocated_storage ==
              rds_instance_list.1.allocated_storage
          - _rds_instance_info_dict['mariadb118'].auto_minor_version_upgrade ==
              rds_instance_list.1.auto_minor_version_upgrade
          - _rds_instance_info_dict['mariadb118'].ca_certificate_identifier ==
              rds_instance_list.1.ca_certificate_identifier
          - _rds_instance_info_dict['mariadb118'].copy_tags_to_snapshot ==
              rds_instance_list.1.copy_tags_to_snapshot
          - _rds_instance_info_dict['mariadb118'].db_instance_class ==
              rds_instance_list.1.db_instance_class
          - _rds_instance_info_dict['mariadb118'].db_parameter_groups.0.db_parameter_group_name ==
              rds_instance_list.1.db_parameter_group_name
          - _rds_instance_info_dict['mariadb118'].db_subnet_group.db_subnet_group_name ==
              rds_instance_list.1.db_subnet_group_name
          - _rds_instance_info_dict['mariadb118'].db_subnet_group.subnets.0.subnet_identifier ==
              rds_subnet_group_list.0.subnets.0
          - _rds_instance_info_dict['mariadb118'].db_subnet_group.subnets.1.subnet_identifier ==
              rds_subnet_group_list.0.subnets.1
          - _rds_instance_info_dict['mariadb118'].enabled_cloudwatch_logs_exports ==
              rds_instance_list.1.enable_cloudwatch_logs_exports
          - _rds_instance_info_dict['mariadb118'].endpoint.address is defined
          - _rds_instance_info_dict['mariadb118'].endpoint.port is defined
          - _rds_instance_info_dict['mariadb118'].engine ==
              rds_instance_list.1.engine
          - _rds_instance_info_dict['mariadb118'].engine_version ==
              rds_instance_list.1.engine_version
          - _rds_instance_info_dict['mariadb118'].iam_database_authentication_enabled ==
              rds_instance_list.1.enable_iam_database_authentication
          - _rds_instance_info_dict['mariadb118'].master_username ==
              rds_instance_list.1.master_username
          - _rds_instance_info_dict['mariadb118'].max_allocated_storage ==
              rds_instance_list.1.max_allocated_storage
          - _rds_instance_info_dict['mariadb118'].monitoring_interval ==
              rds_instance_list.1.monitoring_interval
          - _rds_instance_info_dict['mariadb118'].monitoring_role_arn ==
              rds_instance_list.1.monitoring_role_arn
          - _rds_instance_info_dict['mariadb118'].multi_az ==
              rds_instance_list.1.multi_az
          - _rds_instance_info_dict['mariadb118'].option_group_memberships.0.option_group_name ==
              rds_instance_list.1.option_group_name
          - _rds_instance_info_dict['mariadb118'].publicly_accessible ==
              rds_instance_list.1.publicly_accessible
          - _rds_instance_info_dict['mariadb118'].storage_encrypted ==
              rds_instance_list.1.storage_encrypted
          - _rds_instance_info_dict['mariadb118'].storage_type ==
              rds_instance_list.1.storage_type

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_security_group_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            security_groups:
              "{{ ec2_security_group_list.0.security_groups |
                  map('combine', {'state': 'absent'}) }}"
        ec2_vpc_igw_list:
          "{{ ec2_vpc_igw_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"
        iam_role_list:
          "{{ iam_role_list |
              map('combine', {'state': 'absent'}) }}"
        rds_instance_list:
          "{{ rds_instance_list |
              map('combine', {'state': 'absent'}) }}"
        rds_instance_param_group_list:
          "{{ rds_instance_param_group_list |
              map('combine', {'state': 'absent'}) }}"
        rds_option_group_list:
          "{{ rds_option_group_list |
              map('combine', {'state': 'absent'}) }}"
        rds_subnet_group_list:
          "{{ rds_subnet_group_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure aws rds instances are deleted
      ansible.builtin.include_role:
        name: rds_instance

    - name: Ensure aws rds option groups are released
      amazon.aws.rds_option_group:
        option_group_name: "{{ _og.option_group_name }}"
        state: absent
        validate_certs: true
      register: __rds_option_group_release
      loop: "{{ rds_option_group_list }}"
      loop_control:
        label: "{{ _og.option_group_name | d(none) }}"
        loop_var: _og
      delay: 30
      retries: 20
      until:
        - __rds_option_group_release is success

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - rds_subnet_group
        - rds_option_group
        - rds_instance_param_group
        - ec2_security_group
        - ec2_vpc_subnet
        - ec2_vpc_igw
        - ec2_vpc_net
        - iam_role
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
