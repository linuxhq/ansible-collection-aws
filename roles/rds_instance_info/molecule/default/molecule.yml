---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        ec2_vpc_igw_list:
          - name: molecule
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

        ec2_vpc_net_list:
          - name: molecule
            cidr_block: 192.168.0.0/24

        ec2_vpc_subnet_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            subnets:
              - name: molecule-a
                az: us-east-1a
                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(25,0) }}"
              - name: molecule-c
                az: us-east-1c
                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(25,1) }}"

        iam_role_list:
          - name: MoleculeRdsMonitoring
            assume_role_policy_document:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Principal:
                    Service: monitoring.rds.amazonaws.com
                  Action:
                    - sts:AssumeRole
            create_instance_profile: false
            managed_policies:
              - AmazonRDSEnhancedMonitoringRole

        rds_instance_list:
          - allocated_storage: 20
            db_instance_class: db.t3.medium
            db_instance_identifier: mariadb106
            db_subnet_group_name: molecule
            engine: mariadb
            engine_version: 10.6.20
            master_user_password: sTxmp3nXHCiMf34e9eWcH39v
            master_username: mnkes9JwUdsq
            publicly_accessible: true
            skip_final_snapshot: true
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].vpc_id }}"

          - allocated_storage: 20
            auto_minor_version_upgrade: false
            ca_certificate_identifier: rds-ca-rsa2048-g1
            copy_tags_to_snapshot: true
            db_instance_class: db.t3.medium
            db_instance_identifier: mariadb118
            db_parameter_group_name: mariadb118
            db_subnet_group_name: molecule
            enable_cloudwatch_logs_exports:
              - audit
              - error
              - general
              - slowquery
            enable_iam_database_authentication: true
            engine: mariadb
            engine_version: 11.8.5
            master_user_password: sTxmp3nXHCiMf34e9eWcH39v
            master_username: mnkes9JwUdsq
            max_allocated_storage: 40
            monitoring_interval: 60
            monitoring_role_arn: 'arn:aws:iam::{{ _aws_caller_info_account }}:role/MoleculeRdsMonitoring'
            multi_az: true
            option_group_name: mariadb118
            publicly_accessible: false
            rules:
              - cidr_ip: "{{ ec2_vpc_net_list.0.cidr_block }}"
                ports:
                  - 3306
                proto: tcp
            storage_encrypted: true
            storage_type: gp3
            skip_final_snapshot: true
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].vpc_id }}"

        rds_instance_param_group_list:
          - name: mariadb118
            engine: mariadb11.8
            immediate: true
            params:
              character_set_client: utf8mb4
              character_set_connection: utf8mb4
              character_set_database: utf8mb4
              character_set_results: utf8mb4
              character_set_server: utf8mb4
              collation_connection: utf8mb4_general_ci
              collation_server: utf8mb4_general_ci
              init_connect: SET NAMES utf8mb4 COLLATE utf8mb4_general_ci
              log_warnings: 2
              max_allowed_packet: 33554432

        rds_option_group_list:
          - engine_name: mariadb
            major_engine_version: 11.8
            option_group_name: mariadb118
            options:
              - option_name: MARIADB_AUDIT_PLUGIN
                option_settings:
                  - name: SERVER_AUDIT_FILE_ROTATE_SIZE
                    value: '1000000'
                  - name: SERVER_AUDIT_FILE_ROTATIONS
                    value: '30'
                  - name: SERVER_AUDIT_QUERY_LOG_LIMIT
                    value: '1024'

        rds_subnet_group_list:
          - name: molecule
            subnets:
              - "{{ _ec2_vpc_subnet_info_dict['molecule-a'].id }}"
              - "{{ _ec2_vpc_subnet_info_dict['molecule-c'].id }}"

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
