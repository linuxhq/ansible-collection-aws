---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_security_group_info
    - ec2_vpc_net_info

  post_tasks:
    - name: Ensure aws security group relationships are confirmed
      vars:
        __cluster: "{{ _ec2_security_group_info_dict['molecule-cluster'] }}"
        __cluster_group_ids:
          "{{ __cluster.ip_permissions |
              map(attribute='user_id_group_pairs') |
              flatten |
              map(attribute='group_id') }}"
      ansible.builtin.assert:
        that:
          - __cluster.group_id in __cluster_group_ids
          - _ec2_security_group_info_dict['molecule-ssh'].group_id in
            (__cluster.ip_permissions |
             selectattr('from_port', 'defined') |
             selectattr('from_port', 'eq', 22) |
             map(attribute='user_id_group_pairs') |
             flatten |
             map(attribute='group_id'))

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_security_group_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            security_groups:
              "{{ ec2_security_group_list.0.security_groups |
                  map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - ec2_security_group
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
