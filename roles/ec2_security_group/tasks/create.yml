---
- name: Ensure aws security groups are created
  tags:
    - ec2_security_group
  amazon.aws.ec2_security_group:
    description: "{{ _sg.1.description | d(_sg.1.name) }}"
    name: "{{ _sg.1.name }}"
    purge_rules: false
    purge_rules_egress: false
    purge_tags: false
    state: present
    validate_certs: true
    vpc_id: "{{ _sg.0.vpc_id }}"
  register: __ec2_security_group_create_result
  loop: "{{ __ec2_security_group_list }}"
  loop_control:
    label: "{{ _sg.1.name | d(none) }}"
    loop_var: _sg
  async: "{{ ansible_check_mode | ternary(0, ec2_security_group_async) }}"
  poll: "{{ ec2_security_group_poll }}"
  when:
    - _sg.0.vpc_id is defined
    - _sg.1.name is defined
    - _sg.1.state | d('present') == 'present'
  changed_when:
    - ansible_check_mode | bool
    - __ec2_security_group_create_result.changed | bool

- name: Ensure created aws security group jobs are complete
  tags:
    - ec2_security_group
  ansible.builtin.async_status:
    jid: "{{ _jid.ansible_job_id }}"
  register: __ec2_security_group_create_status
  loop: "{{ __ec2_security_group_create_result.results }}"
  loop_control:
    label: "{{ _jid._sg[1].name | d(none) }}"
    loop_var: _jid
  delay: "{{ ec2_security_group_delay }}"
  retries: "{{ ec2_security_group_retries }}"
  when:
    - _jid.ansible_job_id is defined
  until:
    - __ec2_security_group_create_status.finished | bool

- name: Ensure absent aws security groups are gathered
  tags:
    - ec2_security_group
  amazon.aws.ec2_security_group_info:
    filters:
      group-name: "{{ _sg.1.name }}"
      vpc-id: "{{ _sg.0.vpc_id }}"
    validate_certs: true
  register: __ec2_security_group_absent_result
  loop: "{{ __ec2_security_group_list }}"
  loop_control:
    label: "{{ _sg.1.name | d(none) }}"
    loop_var: _sg
  when:
    - _sg.0.vpc_id is defined
    - _sg.1.name is defined
    - _sg.1.state | d('present') == 'absent'

- name: Ensure absent aws security group rules are purged
  tags:
    - ec2_security_group
  amazon.aws.ec2_security_group:
    description: "{{ _purge._sg.1.description | d(_purge._sg.1.name) }}"
    name: "{{ _purge._sg.1.name }}"
    purge_rules: true
    purge_rules_egress: false
    purge_tags: false
    rules: []
    state: present
    validate_certs: true
    vpc_id: "{{ _purge._sg.0.vpc_id }}"
  register: __ec2_security_group_purge_result
  loop: "{{ __ec2_security_group_absent_result.results }}"
  loop_control:
    label: "{{ _purge._sg.1.name | d(none) }}"
    loop_var: _purge
  async: "{{ ansible_check_mode | ternary(0, ec2_security_group_async) }}"
  poll: "{{ ec2_security_group_poll }}"
  when:
    - _purge.security_groups | d([]) | length > 0
  changed_when:
    - ansible_check_mode | bool
    - __ec2_security_group_purge_result.changed | bool

- name: Ensure purged aws security group jobs are complete
  tags:
    - ec2_security_group
  ansible.builtin.async_status:
    jid: "{{ _jid.ansible_job_id }}"
  register: __ec2_security_group_purge_status
  loop: "{{ __ec2_security_group_purge_result.results }}"
  loop_control:
    label: "{{ _jid._purge._sg[1].name | d(none) }}"
    loop_var: _jid
  delay: "{{ ec2_security_group_delay }}"
  retries: "{{ ec2_security_group_retries }}"
  when:
    - _jid.ansible_job_id is defined
  until:
    - __ec2_security_group_purge_status.finished | bool
...
