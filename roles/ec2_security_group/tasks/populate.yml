---
- name: Ensure aws security groups are populated
  tags:
    - ec2_security_group
  amazon.aws.ec2_security_group:
    description: "{{ _sg.1.description | d(_sg.1.name) }}"
    name: "{{ _sg.1.name }}"
    purge_rules: true
    purge_rules_egress: true
    purge_tags: true
    rules: "{{ _sg.1.rules | d(omit) }}"
    rules_egress: "{{ _sg.1.rules_egress | d(omit) }}"
    state: present
    tags: "{{ _sg.1.tags | d({}) | combine({'Name': _sg.1.name}) }}"
    validate_certs: true
    vpc_id: "{{ _sg.0.vpc_id }}"
  register: __ec2_security_group_populate_result
  loop: "{{ __ec2_security_group_list }}"
  loop_control:
    label: "{{ _sg.1.name | d(none) }}"
    loop_var: _sg
  async: "{{ ansible_check_mode | ternary(0, ec2_security_group_async) }}"
  poll: "{{ ec2_security_group_poll }}"
  when:
    - _sg.0.vpc_id is defined
    - _sg.1.name is defined
    - _sg.1.state | d('present') == 'present'
  changed_when:
    - ansible_check_mode | bool
    - __ec2_security_group_populate_result.changed | bool

- name: Ensure populated aws security group jobs are complete
  tags:
    - ec2_security_group
  ansible.builtin.async_status:
    jid: "{{ _jid.ansible_job_id }}"
  register: __ec2_security_group_populate_status
  loop: "{{ __ec2_security_group_populate_result.results }}"
  loop_control:
    label: "{{ _jid._sg[1].name | d(none) }}"
    loop_var: _jid
  delay: "{{ ec2_security_group_delay }}"
  retries: "{{ ec2_security_group_retries }}"
  when:
    - _jid.ansible_job_id is defined
  until:
    - __ec2_security_group_populate_status.finished | bool

- name: Ensure absent aws security groups are deleted
  tags:
    - ec2_security_group
  amazon.aws.ec2_security_group:
    name: "{{ _sg.1.name }}"
    state: absent
    validate_certs: true
    vpc_id: "{{ _sg.0.vpc_id }}"
  register: __ec2_security_group_delete_result
  loop: "{{ __ec2_security_group_list }}"
  loop_control:
    label: "{{ _sg.1.name | d(none) }}"
    loop_var: _sg
  async: "{{ ansible_check_mode | ternary(0, ec2_security_group_async) }}"
  poll: "{{ ec2_security_group_poll }}"
  when:
    - _sg.0.vpc_id is defined
    - _sg.1.name is defined
    - _sg.1.state | d('present') == 'absent'
  changed_when:
    - ansible_check_mode | bool
    - __ec2_security_group_delete_result.changed | bool

- name: Ensure deleted aws security group jobs are complete
  tags:
    - ec2_security_group
  ansible.builtin.async_status:
    jid: "{{ _jid.ansible_job_id }}"
  register: __ec2_security_group_delete_status
  loop: "{{ __ec2_security_group_delete_result.results }}"
  loop_control:
    label: "{{ _jid._sg[1].name | d(none) }}"
    loop_var: _jid
  delay: "{{ ec2_security_group_delay }}"
  retries: "{{ ec2_security_group_retries }}"
  when:
    - _jid.ansible_job_id is defined
  until:
    - __ec2_security_group_delete_status.finished | bool
...
