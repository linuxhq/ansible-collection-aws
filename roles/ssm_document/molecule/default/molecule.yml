---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        ssm_document_list:
          - name: molecule-command-shell
            document_type: Command
            content:
              schema_version: '2.2'
              description: Run a shell command
              main_steps:
                - action: aws:runShellScript
                  name: runShellScript
                  inputs:
                    run_command:
                      - echo molecule
          - name: molecule-command-env
            document_type: Command
            content:
              schema_version: '2.2'
              description: Print environment
              main_steps:
                - action: aws:runShellScript
                  name: printEnvironment
                  inputs:
                    run_command:
                      - env | sort
          - name: molecule-session-shell
            document_type: Session
            content:
              schema_version: '1.0'
              description: Session Manager shell preferences
              session_type: Standard_Stream
              inputs:
                idle_session_timeout: 60
                run_as_enabled: false
                shell_profile:
                  linux: cd
                  windows: ''

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
