---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  pre_tasks:
    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ssm_document_list:
          "{{ ssm_document_list |
              map('combine', {'state': 'absent'}) }}"

  roles:
    - ssm_document
...
