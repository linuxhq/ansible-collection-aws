---
- name: Ensure aws route53 resolver rule association defaults are present
  tags:
    - route53_resolver_rule_associate_associate
  ansible.builtin.set_fact:
    __route53_resolver_rule_associate_list:
      "{{ [{'state': 'present'}] |
          product(route53_resolver_rule_associate_list) |
          map('combine') |
          list }}"

- name: Ensure information about aws route53 resolver rule associations is gathered
  tags:
    - route53_resolver_rule_associate
  ansible.builtin.command:
    cmd: >
      aws route53resolver list-resolver-rule-associations
        --query ResolverRuleAssociations
  register: __route53_resolver_rule_associate_query
  changed_when: false
  check_mode: false

- name: Ensure list of aws route53 resolver rule associations is generated
  tags:
    - route53_resolver_rule_associate
  ansible.builtin.set_fact:
    __route53_resolver_rule_associate_state:
      "{{ (__route53_resolver_rule_associate_query.stdout |
          from_json) |
          d([]) }}"

- name: Ensure aws route53 resolver rule association tasks are included
  tags:
    - route53_resolver_rule_associate
  ansible.builtin.include_tasks:
    apply:
      tags:
        - route53_resolver_rule_associate
    file: include.yml
  loop: "{{ __route53_resolver_rule_associate_list }}"
  loop_control:
    label: "{{ _resolver_rule_association.name | d(none) }}"
    loop_var: _resolver_rule_association
  when:
    - _resolver_rule_association.name is defined
    - _resolver_rule_association.resolver_rule_id is defined
    - _resolver_rule_association.vpc_id is defined
...
