---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        iam_user_list:
          - name: molecule-admin
            purge_policies: true
          - name: molecule-kopia
            purge_policies: true
          - name: molecule-molecule
            purge_policies: true

        iam_group_list:
          - name: molecule-admin
            managed_policies:
              - AdministratorAccess
            purge_policies: true
            users:
              - molecule-admin

          - name: molecule-kopia
            managed_policies:
              - AmazonS3FullAccess
            purge_policies: true
            users:
              - molecule-kopia

          - name: molecule-molecule
            managed_policies:
              - AmazonEC2FullAccess
              - AmazonVPCReadOnlyAccess
            purge_policies: true
            users:
              - molecule-molecule

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
