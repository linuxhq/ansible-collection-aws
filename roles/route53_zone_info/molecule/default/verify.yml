---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_vpc_net_info
    - route53_zone_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _route53_zone_info_dict[route53_zone_list.0.zone].id is defined
          - _route53_zone_info_dict[route53_zone_list.0.zone].config.private_zone == false
          - _route53_zone_info_dict[route53_zone_list.0.zone].name is defined
          - _route53_zone_info_dict[route53_zone_list.1.zone].id is defined
          - _route53_zone_info_dict[route53_zone_list.1.zone].config.private_zone == false
          - _route53_zone_info_dict[route53_zone_list.1.zone].name is defined
          - _route53_zone_info_dict[route53_zone_list.2.zone].id is defined
          - _route53_zone_info_dict[route53_zone_list.2.zone].config.private_zone == false
          - _route53_zone_info_dict[route53_zone_list.2.zone].name is defined
          - _route53_zone_info_dict[route53_zone_list.3.zone].id is defined
          - _route53_zone_info_dict[route53_zone_list.3.zone].config.private_zone == true
          - _route53_zone_info_dict[route53_zone_list.3.zone].name is defined
          - _route53_zone_info_dict[route53_zone_list.4.zone].id is defined
          - _route53_zone_info_dict[route53_zone_list.4.zone].config.private_zone == true
          - _route53_zone_info_dict[route53_zone_list.4.zone].name is defined
          - _route53_zone_info_dict[route53_zone_list.5.zone].id is defined
          - _route53_zone_info_dict[route53_zone_list.5.zone].config.private_zone == true
          - _route53_zone_info_dict[route53_zone_list.5.zone].name is defined

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        route53_zone_list:
          "{{ route53_zone_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - route53_zone
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
