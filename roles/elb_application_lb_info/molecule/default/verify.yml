---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - elb_application_lb_info
    - ec2_vpc_net_info
    - ec2_vpc_subnet_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _elb_application_lb_info_dict['molecule-http-80'].availability_zones.0.subnet_id ==
              elb_application_lb_list.0.subnets.1
          - _elb_application_lb_info_dict['molecule-http-80'].availability_zones.1.subnet_id ==
              elb_application_lb_list.0.subnets.0
          - _elb_application_lb_info_dict['molecule-http-80'].dns_name is defined
          - _elb_application_lb_info_dict['molecule-http-80'].ip_address_type == 'ipv4'
          - _elb_application_lb_info_dict['molecule-http-80'].listeners.0.port ==
              elb_application_lb_list.0.listeners.0.Port
          - _elb_application_lb_info_dict['molecule-http-80'].load_balancer_arn is defined
          - _elb_application_lb_info_dict['molecule-http-80'].load_balancer_name is defined
          - _elb_application_lb_info_dict['molecule-http-80'].vpc_id ==
              elb_application_lb_list.0.vpc_id

          - _elb_application_lb_info_dict['molecule-http-81'].availability_zones.0.subnet_id ==
              elb_application_lb_list.1.subnets.1
          - _elb_application_lb_info_dict['molecule-http-81'].availability_zones.1.subnet_id ==
              elb_application_lb_list.1.subnets.0
          - _elb_application_lb_info_dict['molecule-http-81'].dns_name is defined
          - _elb_application_lb_info_dict['molecule-http-81'].ip_address_type == 'ipv4'
          - _elb_application_lb_info_dict['molecule-http-81'].listeners.0.port ==
              elb_application_lb_list.1.listeners.0.Port
          - _elb_application_lb_info_dict['molecule-http-81'].load_balancer_arn is defined
          - _elb_application_lb_info_dict['molecule-http-81'].load_balancer_name is defined
          - _elb_application_lb_info_dict['molecule-http-81'].vpc_id ==
              elb_application_lb_list.1.vpc_id

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_igw_list:
          "{{ ec2_vpc_igw_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"
        elb_application_lb_list:
          "{{ elb_application_lb_list |
              map('combine', {'state': 'absent'}) }}"
        elb_target_group_list:
          "{{ elb_target_group_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - elb_application_lb
        - elb_target_group
        - ec2_vpc_subnet
        - ec2_vpc_igw
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
