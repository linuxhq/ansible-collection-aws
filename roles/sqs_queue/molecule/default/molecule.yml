---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        sqs_queue_list:
          - name: molecule-bounce
            delay_seconds: 0
            policy:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Principal:
                    AWS:
                      - "arn:aws:iam::{{ _aws_caller_info_account }}:root"
                  Action:
                    - sqs:*
                  Resource:
                    - "arn:aws:sqs:{{ _aws_az_info_list_l.0[:-1] }}:{{ _aws_caller_info_account }}:molecule-bounce"
                - Effect: Allow
                  Principal:
                    Service: sns.amazonaws.com
                  Action:
                    - sqs:SendMessage
                  Resource:
                    - "arn:aws:sqs:{{ _aws_az_info_list_l.0[:-1] }}:{{ _aws_caller_info_account }}:molecule-bounce"
                  Condition:
                    ArnEquals:
                      'aws:SourceArn':
                        "arn:aws:sns:{{ _aws_az_info_list_l.0[:-1] }}:{{ _aws_caller_info_account }}:molecule-bounce"

          - name: molecule-complaint
            delay_seconds: 0
            policy:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Principal:
                    AWS:
                      - "arn:aws:iam::{{ _aws_caller_info_account }}:root"
                  Action:
                    - sqs:*
                  Resource:
                    - "arn:aws:sqs:{{ _aws_az_info_list_l.0[:-1] }}:{{ _aws_caller_info_account }}:molecule-complaint"
                - Effect: Allow
                  Principal:
                    Service: sns.amazonaws.com
                  Action:
                    - sqs:SendMessage
                  Resource:
                    - "arn:aws:sqs:{{ _aws_az_info_list_l.0[:-1] }}:{{ _aws_caller_info_account }}:molecule-complaint"
                  Condition:
                    ArnEquals:
                      'aws:SourceArn':
                        "arn:aws:sns:{{ _aws_az_info_list_l.0[:-1] }}:{{ _aws_caller_info_account }}:molecule-complaint"

          - name: molecule-delivery
            delay_seconds: 0
            policy:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Principal:
                    AWS:
                      - "arn:aws:iam::{{ _aws_caller_info_account }}:root"
                  Action:
                    - sqs:*
                  Resource:
                    - "arn:aws:sqs:{{ _aws_az_info_list_l.0[:-1] }}:{{ _aws_caller_info_account }}:molecule-delivery"
                - Effect: Allow
                  Principal:
                    Service: sns.amazonaws.com
                  Action:
                    - sqs:SendMessage
                  Resource:
                    - "arn:aws:sqs:{{ _aws_az_info_list_l.0[:-1] }}:{{ _aws_caller_info_account }}:molecule-delivery"
                  Condition:
                    ArnEquals:
                      'aws:SourceArn':
                        "arn:aws:sns:{{ _aws_az_info_list_l.0[:-1] }}:{{ _aws_caller_info_account }}:molecule-delivery"

        sqs_queue_updated_list:
          - "{{ sqs_queue_list.0 | combine({'delay_seconds': 15}) }}"
          - "{{ sqs_queue_list.1 | combine({'delay_seconds': 15}) }}"
          - "{{ sqs_queue_list.2 | combine({'delay_seconds': 15}) }}"

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
