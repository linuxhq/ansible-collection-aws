---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        s3_bucket_list:
          - name: "molecule-bucket-{{ ansible_facts.date_time.date }}-00"
            accelerate_enabled: true
            policy:
              Version: '2012-10-17'
              Statement:
                - Effect: Deny
                  Action: s3:*
                  Principal: '*'
                  Resource:
                    - "arn:aws:s3:::molecule-bucket-{{ ansible_facts.date_time.date }}-00"
                    - "arn:aws:s3:::molecule-bucket-{{ ansible_facts.date_time.date }}-00/*"
                  Condition:
                    Bool:
                      'aws:SecureTransport': false
            public_access:
              block_public_acls: true
              block_public_policy: true
              ignore_public_acls: true
              restrict_public_buckets: true

          - name: "molecule-bucket-{{ ansible_facts.date_time.date }}-01"
          - name: "molecule-bucket-{{ ansible_facts.date_time.date }}-02"
          - name: "molecule-bucket-{{ ansible_facts.date_time.date }}-03"
          - name: "molecule-bucket-{{ ansible_facts.date_time.date }}-04"
          - name: "molecule-bucket-{{ ansible_facts.date_time.date }}-05"
          - name: "molecule-bucket-{{ ansible_facts.date_time.date }}-06"
          - name: "molecule-bucket-{{ ansible_facts.date_time.date }}-07"
          - name: "molecule-bucket-{{ ansible_facts.date_time.date }}-08"
          - name: "molecule-bucket-{{ ansible_facts.date_time.date }}-09"
          - name: "molecule-bucket-{{ ansible_facts.date_time.date }}-10"
          - name: "molecule-bucket-{{ ansible_facts.date_time.date }}-11"
          - name: "molecule-bucket-{{ ansible_facts.date_time.date }}-12"
          - name: "molecule-bucket-{{ ansible_facts.date_time.date }}-13"

        s3_bucket_info_bucket_facts:
          bucket_accelerate_configuration: true
          bucket_acl: true
          bucket_cors: true
          bucket_encryption: true
          bucket_lifecycle_configuration: true
          bucket_location: true
          bucket_logging: true
          bucket_notification_configuration: true
          bucket_ownership_controls: true
          bucket_policy: true
          bucket_policy_status: true
          bucket_replication: true
          bucket_request_payment: true
          bucket_tagging: true
          bucket_versioning: true
          bucket_website: true
          public_access_block: true

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
