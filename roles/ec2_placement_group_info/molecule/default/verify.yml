          - _ec2_placement_group_info_dict['molecule-cluster-4'].strategy == 'cluster'
          - _ec2_placement_group_info_dict['molecule-cluster-5'].group_arn is defined
          - _ec2_placement_group_info_dict['molecule-cluster-5'].group_id is defined
          - _ec2_placement_group_info_dict['molecule-cluster-5'].state == 'available'
          - _ec2_placement_group_info_dict['molecule-cluster-5'].strategy == 'cluster'
          - _ec2_placement_group_info_dict['molecule-cluster-6'].group_arn is defined
          - _ec2_placement_group_info_dict['molecule-cluster-6'].group_id is defined
          - _ec2_placement_group_info_dict['molecule-cluster-6'].state == 'available'
          - _ec2_placement_group_info_dict['molecule-cluster-6'].strategy == 'cluster'
