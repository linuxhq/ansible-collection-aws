---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  tasks:
    - name: Ensure role is included without name
      ansible.builtin.include_role:
        name: ec2_placement_group_info

    - name: Ensure cluster placement group info is verified
      ansible.builtin.assert:
        that:
          - _ec2_placement_group_info_dict[item.name].group_arn is defined
          - _ec2_placement_group_info_dict[item.name].group_id is defined
          - _ec2_placement_group_info_dict[item.name].state == 'available'
          - _ec2_placement_group_info_dict[item.name].strategy == 'cluster'
      loop: "{{ ec2_placement_group_list |
                selectattr('strategy', 'equalto', 'cluster') |
                map(attribute='placement_groups') |
                flatten }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Ensure partition placement group info is verified
      ansible.builtin.assert:
        that:
          - _ec2_placement_group_info_dict[item.name].group_arn is defined
          - _ec2_placement_group_info_dict[item.name].group_id is defined
          - _ec2_placement_group_info_dict[item.name].state == 'available'
          - _ec2_placement_group_info_dict[item.name].strategy == 'partition'
      loop: "{{ ec2_placement_group_list |
                selectattr('strategy', 'equalto', 'partition') |
                map(attribute='placement_groups') |
                flatten }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Ensure spread placement group info is verified
      ansible.builtin.assert:
        that:
          - _ec2_placement_group_info_dict[item.name].group_arn is defined
          - _ec2_placement_group_info_dict[item.name].group_id is defined
          - _ec2_placement_group_info_dict[item.name].spread_level == 'rack'
          - _ec2_placement_group_info_dict[item.name].state == 'available'
          - _ec2_placement_group_info_dict[item.name].strategy == 'spread'
      loop: "{{ ec2_placement_group_list |
                selectattr('strategy', 'equalto', 'spread') |
                map(attribute='placement_groups') |
                flatten }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Ensure role is included with name
      ansible.builtin.include_role:
        name: ec2_placement_group_info
      vars:
        ec2_placement_group_info_group_names:
          - molecule-cluster-1

    - name: Ensure info with name is verified
      ansible.builtin.assert:
        that:
          - _ec2_placement_group_info_list | length == 1
          - _ec2_placement_group_info_list.0.group_name == 'molecule-cluster-1'
          - _ec2_placement_group_info_dict.keys() | list == ['molecule-cluster-1']
          - _ec2_placement_group_info_dict['molecule-cluster-1'].group_id is defined
          - _ec2_placement_group_info_dict['molecule-cluster-1'].strategy == 'cluster'

    - name: Ensure group id filter target is generated
      ansible.builtin.set_fact:
        ec2_placement_group_info_group_id_filter:
          "{{ _ec2_placement_group_info_dict['molecule-cluster-1'].group_id }}"

    - name: Ensure role is included with group id
      ansible.builtin.include_role:
        name: ec2_placement_group_info
      vars:
        ec2_placement_group_info_group_ids:
          - "{{ ec2_placement_group_info_group_id_filter }}"

    - name: Ensure info with group id is verified
      ansible.builtin.assert:
        that:
          - _ec2_placement_group_info_list | length == 1
          - _ec2_placement_group_info_list.0.group_id ==
              ec2_placement_group_info_group_id_filter
          - _ec2_placement_group_info_dict.keys() | list == ['molecule-cluster-1']

    - name: Ensure role is included with filters
      ansible.builtin.include_role:
        name: ec2_placement_group_info
      vars:
        ec2_placement_group_info_filters:
          group-name: molecule-spread-1

    - name: Ensure info with filters is verified
      ansible.builtin.assert:
        that:
          - _ec2_placement_group_info_list | length == 1
          - _ec2_placement_group_info_list.0.group_name == 'molecule-spread-1'
          - _ec2_placement_group_info_dict.keys() | list == ['molecule-spread-1']

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_placement_group_list:
          "{{ ec2_placement_group_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - ec2_placement_group
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
