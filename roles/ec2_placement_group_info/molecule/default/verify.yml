---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  tasks:
    - name: Ensure role is included without name
      ansible.builtin.include_role:
        name: ec2_placement_group_info
      vars:
        ec2_placement_group_info_group_names: []

    - name: Ensure info without name is verified
      ansible.builtin.assert:
        that:
          - _ec2_placement_group_info_dict['molecule-cluster-1'].group_arn is defined
          - _ec2_placement_group_info_dict['molecule-cluster-1'].group_id is defined
          - _ec2_placement_group_info_dict['molecule-cluster-1'].state == 'available'
          - _ec2_placement_group_info_dict['molecule-cluster-1'].strategy == 'cluster'
          - _ec2_placement_group_info_dict['molecule-cluster-2'].group_arn is defined
          - _ec2_placement_group_info_dict['molecule-cluster-2'].group_id is defined
