---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_security_group_info
    - ec2_vpc_net_info
    - ec2_vpc_subnet_info
    - glue_connection_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _glue_connection_info_dict['molecule'].ConnectionProperties.KAFKA_SSL_ENABLED ==
              glue_connection_list.0.connection_properties.KAFKA_SSL_ENABLED
          - _glue_connection_info_dict['molecule'].ConnectionType ==
              glue_connection_list.0.connection_type
          - _glue_connection_info_dict['molecule'].Description ==
              glue_connection_list.0.name
          - _glue_connection_info_dict['molecule'].Name ==
              glue_connection_list.0.name
          - _glue_connection_info_dict['molecule'].PhysicalConnectionRequirements.AvailabilityZone ==
              glue_connection_list.0.availability_zone
          - _glue_connection_info_dict['molecule'].PhysicalConnectionRequirements.SecurityGroupIdList ==
              glue_connection_list.0.security_groups
          - _glue_connection_info_dict['molecule'].PhysicalConnectionRequirements.SubnetId ==
              glue_connection_list.0.subnet_id

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_security_group_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            security_groups:
              "{{ ec2_security_group_list.0.security_groups |
                  map('combine', {'state': 'absent'}) }}"
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"
        glue_connection_list:
          "{{ glue_connection_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - glue_connection
        - ec2_security_group
        - ec2_vpc_subnet
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
