---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_security_group_info
    - ec2_vpc_net_info
    - ec2_vpc_subnet_info

  post_tasks:
    - name: Ensure role is included without filters or name
      ansible.builtin.include_role:
        name: glue_connection_info

    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _glue_connection_info_dict['molecule'].connection_properties.KAFKA_SSL_ENABLED ==
              glue_connection_list.0.connection_properties.KAFKA_SSL_ENABLED
          - _glue_connection_info_dict['molecule'].connection_type ==
              glue_connection_list.0.connection_type
          - _glue_connection_info_dict['molecule'].description ==
              glue_connection_list.0.name
          - _glue_connection_info_dict['molecule'].name ==
              glue_connection_list.0.name
          - _glue_connection_info_dict['molecule'].physical_connection_requirements.availability_zone ==
              glue_connection_list.0.availability_zone
          - _glue_connection_info_dict['molecule'].physical_connection_requirements.security_group_id_list ==
              glue_connection_list.0.security_groups
          - _glue_connection_info_dict['molecule'].physical_connection_requirements.subnet_id ==
              glue_connection_list.0.subnet_id

    - name: Ensure role is included with name
      ansible.builtin.include_role:
        name: glue_connection_info
      vars:
        glue_connection_info_name: molecule

    - name: Ensure info with name is verified
      ansible.builtin.assert:
        that:
          - _glue_connection_info_list | length == 1
          - _glue_connection_info_dict.keys() | list == ['molecule']
          - _glue_connection_info_dict['molecule'].connection_type ==
              glue_connection_list.0.connection_type

    - name: Ensure role is included with filters
      ansible.builtin.include_role:
        name: glue_connection_info
      vars:
        glue_connection_info_filters:
          connection_type: "{{ glue_connection_list.0.connection_type }}"

    - name: Ensure info with filters is verified
      ansible.builtin.assert:
        that:
          - _glue_connection_info_dict['molecule'].name == glue_connection_list.0.name

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_security_group_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            security_groups:
              "{{ ec2_security_group_list.0.security_groups |
                  map('combine', {'state': 'absent'}) }}"
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"
        glue_connection_list:
          "{{ glue_connection_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - glue_connection
        - ec2_security_group
        - ec2_vpc_subnet
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
