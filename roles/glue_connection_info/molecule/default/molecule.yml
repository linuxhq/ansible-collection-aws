---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        ec2_security_group_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            security_groups:
              - name: molecule-rds
                rules:
                  - cidr_ip: "{{ ec2_vpc_net_list.0.cidr_block }}"
                    ports:
                      - 3306
                    proto: tcp
                rules_egress:
                  - cidr_ip: 0.0.0.0/0
                    proto: -1

        ec2_vpc_net_list:
          - name: molecule
            cidr_block: 192.168.0.0/24

        ec2_vpc_subnet_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            subnets:
              - name: molecule
                az: us-east-1a
                cidr: 192.168.0.0/24

        glue_connection_list:
          - name: molecule
            availability_zone: us-east-1a
            connection_properties:
              KAFKA_SSL_ENABLED: 'false'
            connection_type: NETWORK
            security_groups:
              - "{{ _ec2_security_group_info_dict['molecule-rds'].group_id }}"
            subnet_id: "{{ _ec2_vpc_subnet_info_dict['molecule'].id }}"

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
