---
- name: Verify
  hosts: all
  environment:
    PATH: "/opt/awscli/bin:{{ ansible_env.PATH }}"

  roles:
    - rds_option_group_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _rds_option_group_info_dict['mariadb106'].engine_name is defined
          - _rds_option_group_info_dict['mariadb106'].major_engine_version is defined
          - _rds_option_group_info_dict['mariadb106'].option_group_arn is defined
          - _rds_option_group_info_dict['mariadb106'].option_group_description is defined
          - _rds_option_group_info_dict['mariadb106'].option_group_name is defined
          - _rds_option_group_info_dict['mariadb106'].options is defined
          - _rds_option_group_info_dict['mariadb106'].options | length > 0
          - _rds_option_group_info_dict['mariadb114'].engine_name is defined
          - _rds_option_group_info_dict['mariadb114'].major_engine_version is defined
          - _rds_option_group_info_dict['mariadb114'].option_group_arn is defined
          - _rds_option_group_info_dict['mariadb114'].option_group_description is defined
          - _rds_option_group_info_dict['mariadb114'].option_group_name is defined
          - _rds_option_group_info_dict['mariadb114'].options is defined
          - _rds_option_group_info_dict['mariadb114'].options | length > 0
          - _rds_option_group_info_dict['mariadb118'].engine_name is defined
          - _rds_option_group_info_dict['mariadb118'].major_engine_version is defined
          - _rds_option_group_info_dict['mariadb118'].option_group_arn is defined
          - _rds_option_group_info_dict['mariadb118'].option_group_description is defined
          - _rds_option_group_info_dict['mariadb118'].option_group_name is defined
          - _rds_option_group_info_dict['mariadb118'].options is defined
          - _rds_option_group_info_dict['mariadb118'].options | length > 0

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        rds_option_group_list:
          "{{ rds_option_group_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _role }}"
      loop:
        - rds_option_group
      loop_control:
        label: "{{ _role }}"
        loop_var: _role
...
