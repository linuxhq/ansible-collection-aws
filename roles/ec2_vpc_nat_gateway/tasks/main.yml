---
- name: Ensure information about aws virtual private cloud nat gateways is gathered
  tags:
    - ec2_vpc_nat_gateway
  amazon.aws.ec2_vpc_nat_gateway_info:
    filters:
      state:
        - available
    validate_certs: true
  register: __ec2_vpc_nat_gateway_info

- name: Ensure dict of aws virtual private cloud nat gateways is generated
  tags:
    - ec2_vpc_nat_gateway
  ansible.builtin.set_fact:
    __ec2_vpc_nat_gateway_dict:
      "{{ __ec2_vpc_nat_gateway_info.result |
          selectattr('tags.Name', 'defined') |
          json_query('[].{
            key: tags.Name,
            value: nat_gateway_id
          }') |
          items2dict }}"

- name: Ensure aws virtual private cloud nat gateways are batched
  tags:
    - ec2_vpc_nat_gateway
  ansible.builtin.include_tasks:
    apply:
      tags:
        - ec2_vpc_nat_gateway
    file: include.yml
  loop:
    "{{ ec2_vpc_nat_gateway_list |
        batch(ec2_vpc_nat_gateway_batch) }}"
  loop_control:
    label: "{{ __ec2_vpc_nat_gateway_list | length }}"
    loop_var: __ec2_vpc_nat_gateway_list
...
