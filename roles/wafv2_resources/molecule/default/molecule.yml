---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        elb_application_lb_list:
          - name: molecule
            subnets:
              - "{{ _ec2_vpc_subnet_info_dict['molecule-a'].id }}"
              - "{{ _ec2_vpc_subnet_info_dict['molecule-b'].id }}"
            listeners:
              - Protocol: HTTP
                Port: 80
                DefaultActions:
                  - Type: forward
                    TargetGroupName: molecule
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

        elb_target_group_list:
          - name: molecule
            health_check_interval: 10
            health_check_path: /healthcheck
            health_check_port: 8080
            health_check_protocol: http
            healthy_threshold_count: 3
            modify_targets: false
            port: 8080
            protocol: http
            stickiness_enabled: true
            target_type: instance
            unhealthy_threshold_count: 3
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

        ec2_vpc_igw_list:
          - name: molecule
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

        ec2_vpc_net_list:
          - name: molecule
            cidr_block: 192.168.0.0/24

        ec2_vpc_subnet_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            subnets:
              - name: molecule-a
                az: us-east-1a
                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(25,0) }}"
              - name: molecule-b
                az: us-east-1b
                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(25,1) }}"

        wafv2_resources_list:
          - arn: "{{ _elb_application_lb_info_dict['molecule'].load_balancer_arn }}"
            name: molecule
            scope: regional

        wafv2_web_acl_list:
          - name: molecule
            scope: regional
            default_action: Allow
            rules:
              - name: AWS-AWSManagedRulesAmazonIpReputationList
                priority: 0
                override_action:
                  none: {}
                statement:
                  managed_rule_group_statement:
                    name: AWSManagedRulesAmazonIpReputationList
                    vendor_name: AWS
                visibility_config:
                  cloud_watch_metrics_enabled: true
                  metric_name: AWS-AWSManagedRulesAmazonIpReputationList
                  sampled_requests_enabled: true

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
