---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_vpc_net_info
    - ec2_vpc_subnet_info
    - route53_resolver_info
    - route53_resolver_rule_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _route53_resolver_rule_info_dict['molecule-cloudflare'].Arn is defined
          - _route53_resolver_rule_info_dict['molecule-cloudflare'].DomainName ==
              route53_resolver_rule_list.0.domain_name ~ '.'
          - _route53_resolver_rule_info_dict['molecule-cloudflare'].Id is defined
          - _route53_resolver_rule_info_dict['molecule-cloudflare'].ResolverEndpointId ==
              route53_resolver_rule_list.0.resolver_endpoint_id
          - _route53_resolver_rule_info_dict['molecule-cloudflare'].RuleType ==
              route53_resolver_rule_list.0.rule_type | upper
          - _route53_resolver_rule_info_dict['molecule-cloudflare'].Status == 'COMPLETE'
          - _route53_resolver_rule_info_dict['molecule-cloudflare'].TargetIps.0.Ip ==
              route53_resolver_rule_list.0.target_ips.0.Ip
          - _route53_resolver_rule_info_dict['molecule-cloudflare'].TargetIps.0.Port ==
              route53_resolver_rule_list.0.target_ips.0.Port
          - _route53_resolver_rule_info_dict['molecule-cloudflare'].TargetIps.1.Ip ==
              route53_resolver_rule_list.0.target_ips.1.Ip
          - _route53_resolver_rule_info_dict['molecule-cloudflare'].TargetIps.1.Port ==
              route53_resolver_rule_list.0.target_ips.1.Port
          - _route53_resolver_rule_info_dict['molecule-google'].Arn is defined
          - _route53_resolver_rule_info_dict['molecule-google'].DomainName ==
              route53_resolver_rule_list.1.domain_name ~ '.'
          - _route53_resolver_rule_info_dict['molecule-google'].Id is defined
          - _route53_resolver_rule_info_dict['molecule-google'].ResolverEndpointId ==
              route53_resolver_rule_list.1.resolver_endpoint_id
          - _route53_resolver_rule_info_dict['molecule-google'].RuleType ==
              route53_resolver_rule_list.1.rule_type | upper
          - _route53_resolver_rule_info_dict['molecule-google'].Status == 'COMPLETE'
          - _route53_resolver_rule_info_dict['molecule-google'].TargetIps.0.Ip ==
              route53_resolver_rule_list.1.target_ips.0.Ip
          - _route53_resolver_rule_info_dict['molecule-google'].TargetIps.0.Port ==
              route53_resolver_rule_list.1.target_ips.0.Port
          - _route53_resolver_rule_info_dict['molecule-google'].TargetIps.1.Ip ==
              route53_resolver_rule_list.1.target_ips.1.Ip
          - _route53_resolver_rule_info_dict['molecule-google'].TargetIps.1.Port ==
              route53_resolver_rule_list.1.target_ips.1.Port

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"
        route53_resolver_list:
          "{{ route53_resolver_list |
              map('combine', {'state': 'absent'}) }}"
        route53_resolver_rule_list:
          "{{ route53_resolver_rule_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - route53_resolver_rule
        - route53_resolver
        - ec2_vpc_subnet
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
