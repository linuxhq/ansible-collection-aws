---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - aws_caller_info
    - ec2_transit_gateway_info
    - ec2_transit_gateway_vpc_attachment_info
    - ec2_vpc_net_info
    - ec2_vpc_subnet_info

  post_tasks:
    - name: Ensure role is included without filters
      ansible.builtin.include_role:
        name: ec2_flow_log_info

    - name: Ensure info without filters is verified
      ansible.builtin.assert:
        that:
          - _ec2_flow_log_info_dict['molecule-vpc'].flow_log_id is defined
          - _ec2_flow_log_info_dict['molecule-vpc'].tags.molecule == 'ec2_flow_log_info'
          - _ec2_flow_log_info_dict['molecule-vpc'].resource_id ==
              _ec2_vpc_net_info_dict['molecule'].id
          - _ec2_flow_log_info_dict['molecule-vpc'].traffic_type == 'ALL'
          - _ec2_flow_log_info_dict['molecule-subnet'].flow_log_id is defined
          - _ec2_flow_log_info_dict['molecule-subnet'].resource_id ==
              _ec2_vpc_subnet_info_dict['molecule'].id
          - _ec2_flow_log_info_dict['molecule-subnet'].traffic_type == 'ACCEPT'
          - _ec2_flow_log_info_dict['molecule-tgw'].flow_log_id is defined
          - _ec2_flow_log_info_dict['molecule-tgw'].resource_id ==
              _ec2_transit_gateway_info_dict['molecule'].transit_gateway_id
          - _ec2_flow_log_info_dict['molecule-tgw-attachment'].flow_log_id is defined
          - _ec2_flow_log_info_dict['molecule-tgw-attachment'].resource_id ==
              _ec2_transit_gateway_vpc_attachment_info_dict['molecule'] |
              json_query('transit_gateway_attachment_id')

    - name: Ensure role is included with resource ids
      ansible.builtin.include_role:
        name: ec2_flow_log_info
      vars:
        ec2_flow_log_info_resource_ids:
          - "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

    - name: Ensure info with resource ids is verified
      ansible.builtin.assert:
        that:
          - _ec2_flow_log_info_list | length == 1
          - _ec2_flow_log_info_list.0.tags.Name == 'molecule-vpc'
          - _ec2_flow_log_info_dict.keys() | list == ['molecule-vpc']

    - name: Ensure role is included with flow log ids
      ansible.builtin.include_role:
        name: ec2_flow_log_info
      vars:
        ec2_flow_log_info_flow_log_ids:
          - "{{ _ec2_flow_log_info_dict['molecule-vpc'].flow_log_id }}"

    - name: Ensure info with flow log ids is verified
      ansible.builtin.assert:
        that:
          - _ec2_flow_log_info_list | length == 1
          - _ec2_flow_log_info_list.0.tags.Name == 'molecule-vpc'
          - _ec2_flow_log_info_list.0.resource_id == _ec2_vpc_net_info_dict['molecule'].id

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_flow_log_list:
          "{{ ec2_flow_log_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_transit_gateway_list:
          "{{ ec2_transit_gateway_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_transit_gateway_vpc_attachment_list:
          "{{ ec2_transit_gateway_vpc_attachment_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"
        s3_bucket_list:
          "{{ s3_bucket_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - ec2_flow_log
        - ec2_transit_gateway_vpc_attachment
        - ec2_transit_gateway
        - ec2_vpc_subnet
        - ec2_vpc_net
        - s3_bucket
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
