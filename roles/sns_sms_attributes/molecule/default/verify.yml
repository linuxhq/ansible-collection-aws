---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - sns_sms_attributes_info

  tasks:
    - name: Ensure aws simple notification service sms attributes are verified
      ansible.builtin.assert:
        that:
          - _sns_sms_attributes_info_dict is mapping
          - _sns_sms_attributes_info_dict.default_sms_type == 'Transactional'
...
