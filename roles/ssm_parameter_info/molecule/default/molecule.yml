---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        ssm_parameter_info_list:
          "{{ ssm_parameter_list |
              map(attribute='name', default=[]) }}"

        ssm_parameter_list:
          - name: /molecule/db/admin/username
            value: pku9qt7smMqgUixdWpwPH43ooMX9nWcT

          - name: /molecule/db/admin/password
            string_type: SecureString
            value: iEkPpbh4ygXRAutHzLCpX4ytvEgNUsd9

          - name: /molecule/sys/username
            value: VsxKsdzrz9aKwJzFthtPwYXkHqdncKp9

          - name: /molecule/sys/password
            string_type: SecureString
            value: gPTcwxVg7UpJPrHPmAq3aH9C49AigLHw

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
