---
- name: Ensure information about aws systems manager regions is gathered
  tags:
    - ssm_parameter_info
  amazon.aws.aws_az_info:
    validate_certs: true
  register: __ssm_parameter_info_az
  check_mode: false

- name: Ensure string of aws systems manager region is generated
  tags:
    - ssm_parameter_info
  ansible.builtin.set_fact:
    __ssm_parameter_info_region:
      "{{ __ssm_parameter_info_az.availability_zones.0.region_name }}"

- name: Ensure list of aws systems manager parameters is generated
  tags:
    - ssm_parameter_info
  ansible.builtin.set_fact:
    _ssm_parameter_info_list:
      "{{ _ssm_parameter_info_list |
          d([]) +
          [{'name': _parameter.name,
            'value': __ssm_parameter_info_lookup}] }}"
  register: _ssm_parameter_info_result
  loop: "{{ ssm_parameter_info_list }}"
  loop_control:
    label: "{{ _parameter.name | d(none) }}"
    loop_var: _parameter
  when:
    - _parameter.name is defined
  vars:
    __ssm_parameter_info_lookup:
      "{{ lookup('amazon.aws.ssm_parameter',
                 _parameter.name,
                 bypath=_parameter.bypath | d(false),
                 decrypt=_parameter.decrypt | d(true),
                 on_denied=ssm_parameter_info_on_denied,
                 on_missing=ssm_parameter_info_on_missing,
                 recursive=_parameter.recursive | d(false),
                 region=__ssm_parameter_info_region) }}"

- name: Ensure empty list of aws systems manager parameters is generated
  tags:
    - ssm_parameter_info
  ansible.builtin.set_fact:
    _ssm_parameter_info_list: []
  when:
    - _ssm_parameter_info_result is skipped

- name: Ensure dict of aws systems manager parameters is generated
  tags:
    - ssm_parameter_info
  ansible.builtin.set_fact:
    _ssm_parameter_info_dict:
      "{{ dict(_ssm_parameter_info_list |
               json_query('[].name') |
               zip(_ssm_parameter_info_list)) }}"
...
