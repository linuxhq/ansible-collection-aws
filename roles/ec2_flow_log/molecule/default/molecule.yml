---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python

        ec2_flow_log_bucket_name:
          "molecule-flow-log-{{ _aws_caller_info_account }}"
        ec2_flow_log_bucket_resource:
          "arn:aws:s3:::{{ ec2_flow_log_bucket_name }}"
        ec2_flow_log_source_arn:
          "arn:aws:logs:us-east-1:{{ _aws_caller_info_account }}:*"

        s3_bucket_list:
          - name: "{{ ec2_flow_log_bucket_name }}"
            force: true
            policy:
              Version: '2012-10-17'
              Statement:
                - Sid: AWSLogDeliveryWrite
                  Effect: Allow
                  Principal:
                    Service: delivery.logs.amazonaws.com
                  Action:
                    - s3:PutObject
                  Resource:
                    - "{{ ec2_flow_log_bucket_resource }}/AWSLogs/{{ _aws_caller_info_account }}/*"
                  Condition:
                    StringEquals:
                      'aws:SourceAccount': "{{ _aws_caller_info_account }}"
                      's3:x-amz-acl': bucket-owner-full-control
                    ArnLike:
                      'aws:SourceArn': "{{ ec2_flow_log_source_arn }}"
                - Sid: AWSLogDeliveryAclCheck
                  Effect: Allow
                  Principal:
                    Service: delivery.logs.amazonaws.com
                  Action:
                    - s3:GetBucketAcl
                  Resource:
                    - "{{ ec2_flow_log_bucket_resource }}"
                  Condition:
                    StringEquals:
                      'aws:SourceAccount': "{{ _aws_caller_info_account }}"
                    ArnLike:
                      'aws:SourceArn': "{{ ec2_flow_log_source_arn }}"
            public_access:
              block_public_acls: true
              block_public_policy: true
              ignore_public_acls: true
              restrict_public_buckets: true

        ec2_vpc_net_list:
          - name: molecule
            cidr_block: 192.168.0.0/24

        ec2_vpc_subnet_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            subnets:
              - name: molecule
                az: us-east-1a
                cidr: "{{ ec2_vpc_net_list.0.cidr_block }}"

        ec2_transit_gateway_info_filters:
          state:
            - available

        ec2_transit_gateway_vpc_attachment_info_filters:
          state:
            - available

        ec2_transit_gateway_list:
          - name: molecule

        ec2_transit_gateway_vpc_attachment_list:
          - name: molecule
            subnets:
              - "{{ _ec2_vpc_subnet_info_dict['molecule'].id }}"
            transit_gateway:
              "{{ _ec2_transit_gateway_info_dict['molecule'].transit_gateway_id }}"

        ec2_flow_log_list:
          - name: molecule-vpc
            resource_ids:
              - "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            resource_type: VPC
            traffic_type: ALL
            log_destination_type: s3
            log_destination: "{{ ec2_flow_log_bucket_resource }}"

          - name: molecule-subnet
            resource_ids:
              - "{{ _ec2_vpc_subnet_info_dict['molecule'].id }}"
            resource_type: Subnet
            traffic_type: ACCEPT
            log_destination_type: s3
            log_destination: "{{ ec2_flow_log_bucket_resource }}"

          - name: molecule-tgw
            resource_ids:
              - "{{ _ec2_transit_gateway_info_dict['molecule'].transit_gateway_id }}"
            resource_type: TransitGateway
            log_destination_type: s3
            log_destination: "{{ ec2_flow_log_bucket_resource }}"

          - name: molecule-tgw-attachment
            resource_ids:
              - "{{ _ec2_transit_gateway_vpc_attachment_info_dict['molecule'] |
                    json_query('transit_gateway_attachment_id') }}"
            resource_type: TransitGatewayAttachment
            log_destination_type: s3
            log_destination: "{{ ec2_flow_log_bucket_resource }}"

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
