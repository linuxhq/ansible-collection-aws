---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - aws_caller_info
    - ec2_transit_gateway_info
    - ec2_transit_gateway_vpc_attachment_info
    - ec2_vpc_net_info
    - ec2_vpc_subnet_info

  post_tasks:
    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_flow_log_list:
          "{{ ec2_flow_log_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_transit_gateway_list:
          "{{ ec2_transit_gateway_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_transit_gateway_vpc_attachment_list:
          "{{ ec2_transit_gateway_vpc_attachment_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"
        s3_bucket_list:
          "{{ s3_bucket_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - ec2_flow_log
        - ec2_transit_gateway_vpc_attachment
        - ec2_transit_gateway
        - ec2_vpc_subnet
        - ec2_vpc_net
        - s3_bucket
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
