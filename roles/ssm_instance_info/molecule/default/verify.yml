---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - aws_az_info
    - aws_caller_info
    - ec2_ami_info
    - ec2_instance_info
    - ec2_vpc_nat_gateway_info
    - ec2_vpc_net_info
    - ec2_vpc_subnet_info

  post_tasks:
    - name: Ensure aws systems manager instance is online
      linuxhq.aws.ssm_instance_info:
        instance_ids:
          - "{{ _ec2_instance_info_dict['molecule'].instance_id }}"
        validate_certs: true
      register: __ssm_instance_info_wait
      until:
        - __ssm_instance_info_wait.instances.0.ping_status | d('') == 'Online'
      retries: 30
      delay: 10

    - name: Ensure role is included with instance ids
      ansible.builtin.include_role:
        name: ssm_instance_info
      vars:
        ssm_instance_info_instance_ids:
          - "{{ _ec2_instance_info_dict['molecule'].instance_id }}"

    - name: Ensure info with instance ids is verified
      ansible.builtin.assert:
        that:
          - _ssm_instance_info_list | length == 1
          - _ssm_instance_info_dict[
              _ec2_instance_info_dict['molecule'].instance_id
            ].instance_id == _ec2_instance_info_dict['molecule'].instance_id
          - _ssm_instance_info_dict[
              _ec2_instance_info_dict['molecule'].instance_id
            ].ping_status == 'Online'
          - _ssm_instance_info_dict[
              _ec2_instance_info_dict['molecule'].instance_id
            ].resource_type == 'EC2Instance'

    - name: Ensure role is included with ping status
      ansible.builtin.include_role:
        name: ssm_instance_info
      vars:
        ssm_instance_info_instance_ids:
          - "{{ _ec2_instance_info_dict['molecule'].instance_id }}"
        ssm_instance_info_ping_status: Online

    - name: Ensure info with ping status is verified
      ansible.builtin.assert:
        that:
          - _ssm_instance_info_list | length == 1
          - _ssm_instance_info_list.0.ping_status == 'Online'

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_instance_list:
          "{{ ec2_instance_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_security_group_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            security_groups:
              "{{ ec2_security_group_list.0.security_groups |
                  map('combine', {'state': 'absent'}) }}"
        ec2_vpc_igw_list:
          "{{ ec2_vpc_igw_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_nat_gateway_list:
          "{{ ec2_vpc_nat_gateway_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_route_table_list:
          "{{ ec2_vpc_route_table_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"
        iam_instance_profile_list:
          "{{ iam_instance_profile_list |
              map('combine', {'state': 'absent'}) }}"
        iam_role_list:
          "{{ iam_role_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - iam_instance_profile
        - iam_role
        - ec2_instance
        - ec2_security_group
        - ec2_vpc_route_table
        - ec2_vpc_nat_gateway
        - ec2_vpc_subnet
        - ec2_vpc_igw
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
