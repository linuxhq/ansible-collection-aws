---
- name: Ensure aws systems manager parameters are managed
  tags:
    - ssm_parameter
  community.aws.ssm_parameter:
    description: "{{ _parameter.description | d(_parameter.name) }}"
    name: "{{ _parameter.name }}"
    overwrite_value: "{{ _parameter.overwrite_value | d('changed') }}"
    purge_tags: "{{ _parameter.purge_tags | d(true) }}"
    state: "{{ _parameter.state | d('present') }}"
    string_type: "{{ _parameter.string_type | d('String') }}"
    tags:
      "{{ _parameter.tags |
          d({}) |
          combine({'Name': _parameter.name}) }}"
    tier: "{{ _parameter.tier | d('Standard') }}"
    validate_certs: true
    value: "{{ _parameter.value }}"
  register: __ssm_parameter_result
  loop: "{{ __ssm_parameter_list }}"
  loop_control:
    label: "{{ _parameter.name | d(none) }}"
    loop_var: _parameter
  when:
    - _parameter.name is defined
    - _parameter.value is defined
  changed_when: false
  async: "{{ ansible_check_mode | ternary(0, ssm_parameter_async) }}"
  poll: "{{ ssm_parameter_poll }}"

- name: Ensure managed aws systems manager parameter jobs are complete
  tags:
    - ssm_parameter
  ansible.builtin.async_status:
    jid: "{{ _jid.ansible_job_id }}"
  register: __ssm_parameter_status
  loop: "{{ __ssm_parameter_result.results }}"
  loop_control:
    label: "{{ _jid._parameter.name | d(none) }}"
    loop_var: _jid
  when:
    - _jid.ansible_job_id is defined
  until:
    - __ssm_parameter_status.finished | bool
  retries: "{{ ssm_parameter_retries }}"
  delay: "{{ ssm_parameter_delay }}"
...
