---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        ec2_vpc_net_list:
          - name: molecule
            cidr_block: 192.168.0.0/24

        ec2_vpc_igw_list:
          - name: molecule
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

        ec2_vpc_subnet_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            subnets:
              - name: molecule-a
                az:
                  "{{ lookup('ansible.builtin.ini',
                             'region',
                             file='~/.aws/config',
                             section='profile molecule') ~ 'a' }}"

                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(25,0) }}"
              - name: molecule-b
                az:
                  "{{ lookup('ansible.builtin.ini',
                             'region',
                             file='~/.aws/config',
                             section='profile molecule') ~ 'b' }}"
                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(25,1) }}"

        ec2_vpc_nat_gateway_info_filters:
          state:
            - available

        ec2_vpc_nat_gateway_list:
          - name: molecule
            if_exist_do_not_create: true
            release_eip: true
            subnet_id: "{{ _ec2_vpc_subnet_info_dict['molecule-a'].id }}"
            wait: true

        ec2_vpc_route_table_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            route_tables:
              - name: molecule-a
                routes:
                  - dest: '0.0.0.0/0'
                    gateway_id: igw
                subnets:
                  - "{{ _ec2_vpc_subnet_info_dict['molecule-a'].id }}"

              - name: molecule-b
                routes:
                  - dest: '0.0.0.0/0'
                    gateway_id: "{{ _ec2_vpc_nat_gateway_info_dict['molecule'].nat_gateway_id }}"
                subnets:
                  - "{{ _ec2_vpc_subnet_info_dict['molecule-b'].id }}"

        ssm_parameter_list:
          - name: /molecule/vpc/id
            value: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

          - name: /molecule/vpc/igw/id
            value: "{{ _ec2_vpc_igw_info_dict['molecule'].internet_gateway_id }}"

          - name: /molecule/vpc/nat/id
            value: "{{ _ec2_vpc_nat_gateway_info_dict['molecule'].nat_gateway_id }}"

          - name: /molecule/vpc/rtb/a/id
            value: "{{ _ec2_vpc_route_table_info_dict['molecule-a'].route_table_id }}"

          - name: /molecule/vpc/rtb/b/id
            value: "{{ _ec2_vpc_route_table_info_dict['molecule-b'].route_table_id }}"

          - name: /molecule/vpc/subnet/a/id
            value: "{{ _ec2_vpc_subnet_info_dict['molecule-a'].id }}"

          - name: /molecule/vpc/subnet/b/id
            value: "{{ _ec2_vpc_subnet_info_dict['molecule-b'].id }}"

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
