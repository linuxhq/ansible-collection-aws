---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        iam_role_assume_role_policy_document:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: ec2.amazonaws.com
              Action:
                - sts:AssumeRole

        iam_role_managed_policy_list:
          - AmazonEC2ReadOnlyAccess
          - AmazonVPCReadOnlyAccess

        iam_role_name_list:
          - name: molecule-role-00
          - name: molecule-role-01
          - name: molecule-role-02
          - name: molecule-role-03
          - name: molecule-role-04
          - name: molecule-role-05
          - name: molecule-role-06
          - name: molecule-role-07
          - name: molecule-role-08
          - name: molecule-role-09
          - name: molecule-role-10
          - name: molecule-role-11
          - name: molecule-role-12

        iam_role_list:
          "{{ iam_role_name_list |
              map(
                'combine', {
                  'assume_role_policy_document': iam_role_assume_role_policy_document,
                  'create_instance_profile': false,
                  'delete_instance_profile': true,
                  'managed_policies': iam_role_managed_policy_list
                }
              ) }}"

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
