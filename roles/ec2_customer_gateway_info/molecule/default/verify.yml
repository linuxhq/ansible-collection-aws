---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_customer_gateway_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _ec2_customer_gateway_info_dict['molecule-00'] is defined
          - _ec2_customer_gateway_info_dict['molecule-00'].ip_address == ec2_customer_gateway_list.0.ip_address
          - _ec2_customer_gateway_info_dict['molecule-01'] is defined
          - _ec2_customer_gateway_info_dict['molecule-01'].ip_address == ec2_customer_gateway_list.1.ip_address
          - _ec2_customer_gateway_info_dict['molecule-02'] is defined
          - _ec2_customer_gateway_info_dict['molecule-02'].ip_address == ec2_customer_gateway_list.2.ip_address
          - _ec2_customer_gateway_info_dict['molecule-03'] is defined
          - _ec2_customer_gateway_info_dict['molecule-03'].ip_address == ec2_customer_gateway_list.3.ip_address
          - _ec2_customer_gateway_info_dict['molecule-04'] is defined
          - _ec2_customer_gateway_info_dict['molecule-04'].ip_address == ec2_customer_gateway_list.4.ip_address

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_customer_gateway_list:
          "{{ ec2_customer_gateway_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - ec2_customer_gateway
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
