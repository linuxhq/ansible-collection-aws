---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - acm_certificate_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _acm_certificate_info_dict['molecule.aws.linuxhq.dev'].key_algorithm == 'RSA-2048'
          - _acm_certificate_info_dict['molecule.aws.linuxhq.dev'].subject_alternative_names.0 ==
              acm_certificate_list.0.domain_name
          - _acm_certificate_info_dict['molecule.aws.linuxhq.dev'].type == 'AMAZON_ISSUED'
          - _acm_certificate_info_dict['molecule.aws.linuxhq.net'].key_algorithm == 'RSA-2048'
          - _acm_certificate_info_dict['molecule.aws.linuxhq.net'].subject_alternative_names.0 ==
              acm_certificate_list.1.domain_name
          - _acm_certificate_info_dict['molecule.aws.linuxhq.net'].subject_alternative_names.1 ==
              acm_certificate_list.1.subject_alternative_names.0
          - _acm_certificate_info_dict['molecule.aws.linuxhq.net'].type == 'AMAZON_ISSUED'
          - _acm_certificate_info_dict['molecule.aws.linuxhq.org'].key_algorithm == 'RSA-2048'
          - _acm_certificate_info_dict['molecule.aws.linuxhq.org'].subject_alternative_names.0 ==
              acm_certificate_list.2.domain_name
          - _acm_certificate_info_dict['molecule.aws.linuxhq.org'].subject_alternative_names.1 ==
              acm_certificate_list.2.subject_alternative_names.0
          - _acm_certificate_info_dict['molecule.aws.linuxhq.org'].subject_alternative_names.2 ==
              acm_certificate_list.2.subject_alternative_names.1
          - _acm_certificate_info_dict['molecule.aws.linuxhq.org'].type == 'AMAZON_ISSUED'
          - _acm_certificate_info_dict['molecule-import.linuxhq.net'].key_algorithm == 'RSA-2048'
          - _acm_certificate_info_dict['molecule-import.linuxhq.net'].type == 'IMPORTED'
          - _acm_certificate_info_dict['molecule-import.linuxhq.org'].key_algorithm == 'RSA-2048'
          - _acm_certificate_info_dict['molecule-import.linuxhq.org'].type == 'IMPORTED'

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        acm_certificate_list:
          "{{ acm_certificate_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - acm_certificate
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
