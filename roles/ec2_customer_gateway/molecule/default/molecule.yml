---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        ec2_customer_gateway_list_create:
          - name: molecule-00
            ip_address: 1.1.1.0
          - name: molecule-01
            ip_address: 1.1.1.1
          - name: molecule-02
            ip_address: 1.1.1.2
          - name: molecule-03
            ip_address: 1.1.1.3
          - name: molecule-04
            ip_address: 1.1.1.4

        ec2_customer_gateway_list_update:
          - name: molecule-00
            ip_address: 1.1.1.5
          - name: molecule-01
            ip_address: 1.1.1.6
          - name: molecule-02
            ip_address: 1.1.1.7
          - name: molecule-03
            ip_address: 1.1.1.8
          - name: molecule-04
            ip_address: 1.1.1.9

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
