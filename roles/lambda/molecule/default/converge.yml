---
- name: Converge
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - aws_caller_info

    - role: iam_role
      tags:
        - molecule-idempotence-notest
      check_mode: false

    - role: lambda
      lambda_list: []
      tags:
        - molecule-idempotence-notest

  post_tasks:
    - name: Ensure roles are delegated
      ansible.builtin.import_role:
        name: lambda
      delegate_to: localhost
...
