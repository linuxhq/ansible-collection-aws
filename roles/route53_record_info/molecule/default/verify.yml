---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_vpc_net_info
    - route53_record_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _route53_record_info_list |
            selectattr('zone', 'match', route53_record_list.0.zone) |
            map(attribute='resource_record_sets') |
            flatten |
            selectattr('name', 'match', route53_record_list.0.records.0.record) |
            map(attribute='resource_records') |
            flatten |
            map(attribute='value') |
            first == route53_record_list.0.records.0.value

          - _route53_record_info_list |
            selectattr('zone', 'match', route53_record_list.0.zone) |
            map(attribute='resource_record_sets') |
            flatten |
            selectattr('name', 'match', route53_record_list.0.records.1.record) |
            map(attribute='resource_records') |
            flatten |
            map(attribute='value') |
            first == route53_record_list.0.records.1.value

          - _route53_record_info_list |
            selectattr('zone', 'match', route53_record_list.1.zone) |
            map(attribute='resource_record_sets') |
            flatten |
            selectattr('name', 'match', route53_record_list.1.records.0.record) |
            map(attribute='resource_records') |
            flatten |
            map(attribute='value') |
            first == route53_record_list.1.records.0.value

          - _route53_record_info_list |
            selectattr('zone', 'match', route53_record_list.1.zone) |
            map(attribute='resource_record_sets') |
            flatten |
            selectattr('name', 'match', route53_record_list.1.records.1.record) |
            map(attribute='resource_records') |
            flatten |
            map(attribute='value') |
            first == route53_record_list.1.records.1.value

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        route53_record_list:
          - zone: pub.molecule.org
            records:
              "{{ route53_record_list.0.records |
                  map('combine', {'state': 'absent'}) }}"
          - zone: pvt.molecule.org
            private_zone: true
            records:
              "{{ route53_record_list.1.records |
                  map('combine', {'state': 'absent'}) }}"
        route53_zone_list:
          "{{ route53_zone_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - route53_record
        - route53_zone
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
