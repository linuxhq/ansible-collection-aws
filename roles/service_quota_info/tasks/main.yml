---
- name: Ensure information about aws service quota availability zones is gathered
  tags:
    - service_quota_info
  amazon.aws.aws_az_info:
    validate_certs: true
  register: __service_quota_info_availability_zone

- name: Ensure string of aws service quota region is generated
  tags:
    - service_quota_info
  ansible.builtin.set_fact:
    __service_quota_info_region:
      "{{ __service_quota_info_availability_zone.availability_zones.0.region_name }}"

- name: Ensure information about aws service quotas is gathered
  tags:
    - service_quota_info
  linuxhq.aws.service_quota_info:
    context_id: "{{ _servicequota.1.context_id | d(omit) }}"
    quota_code: "{{ _servicequota.1.quota_code }}"
    region: "{{ _servicequota.1.region | d(__service_quota_info_region) }}"
    service_code: "{{ _servicequota.0.service_code }}"
    validate_certs: true
  register: __service_quota_info_query
  loop:
    "{{ q('ansible.builtin.subelements',
          service_quota_info_list,
          'quotas',
          {'skip_missing': true}) }}"
  loop_control:
    label: "{{ _servicequota.1.quota_code | d(none) }}"
    loop_var: _servicequota

- name: Ensure list of aws service quotas is generated
  tags:
    - service_quota_info
  ansible.builtin.set_fact:
    _service_quota_info_list:
      "{{ __service_quota_info_query.results |
          d([]) |
          map(attribute='quota', default=[]) |
          list }}"

- name: Ensure dict of aws service quotas is generated
  tags:
    - service_quota_info
  ansible.builtin.set_fact:
    _service_quota_info_dict:
      "{{ dict(_service_quota_info_list |
               json_query('[].quota_code') |
               zip(_service_quota_info_list)) }}"
...
