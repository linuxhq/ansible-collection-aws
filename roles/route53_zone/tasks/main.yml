---
- name: Ensure aws route53 zone defaults are generated
  tags:
    - eks_cluster
  ansible.builtin.set_fact:
    __route53_zone_list:
      "{{ [{'state': 'present'}] |
          product(route53_zone_list) |
          map('combine') |
          list }}"

- name: Ensure aws route53 public zones are batched
  tags:
    - route53_zone
  ansible.builtin.include_tasks:
    apply:
      tags:
        - route53_zone
    file: public.yml
  loop:
    "{{ __route53_zone_list |
        batch(route53_zone_batch) }}"
  loop_control:
    label: "{{ __route53_zone_batch | length }}"
    loop_var: __route53_zone_batch

- name: Ensure aws route53 public zones are batched
  tags:
    - route53_zone
  ansible.builtin.include_tasks:
    apply:
      tags:
        - route53_zone
    file: private.yml
  loop:
    "{{ __route53_zone_list |
        batch(route53_zone_batch) }}"
  loop_control:
    label: "{{ __route53_zone_batch | length }}"
    loop_var: __route53_zone_batch
...
