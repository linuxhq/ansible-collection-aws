---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        ec2_vpc_net_list:
          - name: molecule
            cidr_block: 192.168.0.0/24

        route53_zone_list:
          - zone: molecule-pub-00.org
          - zone: molecule-pub-01.org
          - zone: molecule-pub-02.org

          - zone: molecule-pvt-01.org
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            vpc_region:
              "{{ lookup('ansible.builtin.ini',
                         'region',
                         file='~/.aws/config',
                         section='profile molecule') }}"

          - zone: molecule-pvt-02.org
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            vpc_region:
              "{{ lookup('ansible.builtin.ini',
                         'region',
                         file='~/.aws/config',
                         section='profile molecule') }}"

          - zone: molecule-pvt-03.org
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            vpc_region:
              "{{ lookup('ansible.builtin.ini',
                         'region',
                         file='~/.aws/config',
                         section='profile molecule') }}"

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
