---
- name: Ensure aws iam oidc providers are managed
  tags:
    - iam_oidc_provider
  linuxhq.aws.iam_oidc_provider:
    client_id_list: "{{ _provider.client_id_list }}"
    purge_tags: "{{ _provider.purge_tags | d(omit) }}"
    state: "{{ _provider.state | d('present') }}"
    tags: "{{ _provider.tags | d({}) | combine({'Name': _provider.name}) }}"
    thumbprint_list: "{{ _provider.thumbprint_list }}"
    url: "{{ _provider.url }}"
    validate_certs: true
  register: __iam_oidc_provider_result
  loop: "{{ __iam_oidc_provider_list }}"
  loop_control:
    label: "{{ _provider.url | d(none) }}"
    loop_var: _provider
  async: "{{ ansible_check_mode | ternary(0, iam_oidc_provider_async) }}"
  poll: "{{ iam_oidc_provider_poll }}"
  changed_when:
    - ansible_check_mode | bool
    - __iam_oidc_provider_result.changed | bool
  when:
    - _provider.url is defined
    - _provider.name is defined
    - _provider.client_id_list is defined
    - _provider.thumbprint_list is defined

- name: Ensure managed aws iam oidc provider jobs are complete
  tags:
    - iam_oidc_provider
  ansible.builtin.async_status:
    jid: "{{ _jid.ansible_job_id }}"
  register: __iam_oidc_provider_status
  loop: "{{ __iam_oidc_provider_result.results }}"
  loop_control:
    label: "{{ _jid._provider.url | d(none) }}"
    loop_var: _jid
  delay: "{{ iam_oidc_provider_delay }}"
  retries: "{{ iam_oidc_provider_retries }}"
  when:
    - _jid.ansible_job_id is defined
  until:
    - __iam_oidc_provider_status.finished | bool
...
