---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        ec2_placement_group_list:
          - strategy: cluster
            placement_groups:
              - name: molecule-cluster-1
              - name: molecule-cluster-2
              - name: molecule-cluster-3
              - name: molecule-cluster-4
              - name: molecule-cluster-5
              - name: molecule-cluster-6

          - strategy: partition
            placement_groups:
              - name: molecule-partition-1
                partition_count: 3
              - name: molecule-partition-2
                partition_count: 3
              - name: molecule-partition-3
                partition_count: 3
              - name: molecule-partition-4
                partition_count: 5
              - name: molecule-partition-5
                partition_count: 5
              - name: molecule-partition-6
                partition_count: 5
              - name: molecule-partition-7
                partition_count: 7
              - name: molecule-partition-8
                partition_count: 7
              - name: molecule-partition-9
                partition_count: 7

          - strategy: spread
            placement_groups:
              - name: molecule-spread-1
              - name: molecule-spread-2
              - name: molecule-spread-3
              - name: molecule-spread-4
              - name: molecule-spread-5
              - name: molecule-spread-6

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
