---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_vpc_dhcp_option_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _ec2_vpc_dhcp_option_info_dict['molecule-00'].dhcp_options_id is defined
          - _ec2_vpc_dhcp_option_info_dict['molecule-01'].dhcp_options_id is defined
          - _ec2_vpc_dhcp_option_info_dict['molecule-02'].dhcp_options_id is defined
          - _ec2_vpc_dhcp_option_info_dict['molecule-03'].dhcp_options_id is defined
          - _ec2_vpc_dhcp_option_info_dict['molecule-04'].dhcp_options_id is defined
          - _ec2_vpc_dhcp_option_info_dict['molecule-05'].dhcp_options_id is defined
          - _ec2_vpc_dhcp_option_info_dict['molecule-06'].dhcp_options_id is defined
          - _ec2_vpc_dhcp_option_info_dict['molecule-07'].dhcp_options_id is defined
          - _ec2_vpc_dhcp_option_info_dict['molecule-08'].dhcp_options_id is defined
          - _ec2_vpc_dhcp_option_info_dict['molecule-09'].dhcp_options_id is defined
          - _ec2_vpc_dhcp_option_info_dict['molecule-10'].dhcp_options_id is defined
          - _ec2_vpc_dhcp_option_info_dict['molecule-11'].dhcp_options_id is defined
          - _ec2_vpc_dhcp_option_info_dict['molecule-12'].dhcp_options_id is defined

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_dhcp_option_list:
          "{{ ec2_vpc_dhcp_option_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - ec2_vpc_dhcp_option
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
