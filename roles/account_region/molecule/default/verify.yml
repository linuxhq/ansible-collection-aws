---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  pre_tasks:
    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        account_region_list:
          "{{ account_region_list |
              map('combine', {'state': 'absent'}) }}"

  roles:
    - account_region
...
