---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        ec2_vpc_net_list:
          - name: molecule
            cidr_block: 10.0.0.0/16

        ec2_vpc_subnet_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            subnets:
              - name: molecule-a
                az: us-east-1a
                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(24,0) }}"
              - name: molecule-b
                az: us-east-1b
                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(24,1) }}"
              - name: molecule-c
                az: us-east-1c
                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(24,2) }}"

        ec2_security_group_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            security_groups:
              - name: molecule-efs1
                rules:
                  - cidr_ip: 0.0.0.0/0
                    ports:
                      - 2049
                    proto: tcp
              - name: molecule-efs2
                rules:
                  - cidr_ip: 10.0.0.0/8
                    ports:
                      - 2049
                    proto: tcp
                rules_egress:
                  - cidr_ip: 10.0.0.0/8
                    ports:
                      - 0-65535
                    proto: tcp

        efs_list:
          - name: molecule-efs1
            tags:
              molecule: efs_info
            encrypt: true
            targets:
              - subnet_id: "{{ _ec2_vpc_subnet_info_dict['molecule-a'].id }}"
                security_groups:
                  - "{{ _ec2_security_group_info_dict['molecule-efs1'].group_id }}"
              - subnet_id: "{{ _ec2_vpc_subnet_info_dict['molecule-b'].id }}"
                security_groups:
                  - "{{ _ec2_security_group_info_dict['molecule-efs1'].group_id }}"
              - subnet_id: "{{ _ec2_vpc_subnet_info_dict['molecule-c'].id }}"
                security_groups:
                  - "{{ _ec2_security_group_info_dict['molecule-efs1'].group_id }}"

          - name: molecule-efs2
            encrypt: true
            targets:
              - subnet_id: "{{ _ec2_vpc_subnet_info_dict['molecule-a'].id }}"
                security_groups:
                  - "{{ _ec2_security_group_info_dict['molecule-efs2'].group_id }}"
              - subnet_id: "{{ _ec2_vpc_subnet_info_dict['molecule-b'].id }}"
                security_groups:
                  - "{{ _ec2_security_group_info_dict['molecule-efs2'].group_id }}"
              - subnet_id: "{{ _ec2_vpc_subnet_info_dict['molecule-c'].id }}"
                security_groups:
                  - "{{ _ec2_security_group_info_dict['molecule-efs2'].group_id }}"

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
