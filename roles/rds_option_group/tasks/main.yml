---
- name: Ensure aws relational database service option groups are batched
  tags:
    - rds_option_group
  ansible.builtin.include_tasks:
    apply:
      tags:
        - rds_option_group
    file: include.yml
  loop:
    "{{ rds_option_group_list |
        batch(rds_option_group_batch) }}"
  loop_control:
    label: "{{ __rds_option_group_list | length }}"
    loop_var: __rds_option_group_list
...
