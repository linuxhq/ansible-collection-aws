---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  pre_tasks:
    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        acm_certificate_list:
          "{{ acm_certificate_list |
              map('combine', {'state': 'absent'}) }}"

  roles:
    - acm_certificate
...
