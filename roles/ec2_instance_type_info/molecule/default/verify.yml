---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  tasks:
    - name: Ensure role is included with instance types
      ansible.builtin.include_role:
        name: ec2_instance_type_info
      vars:
        ec2_instance_type_info_instance_types:
          - t3.micro
          - t3.small

    - name: Ensure info with instance types is verified
      ansible.builtin.assert:
        that:
          - _ec2_instance_type_info_list | length == 2
          - _ec2_instance_type_info_dict['t3.micro'].current_generation | bool
          - _ec2_instance_type_info_dict['t3.micro'].instance_type == 't3.micro'
          - _ec2_instance_type_info_dict['t3.micro'].memory_info.size_in_mi_b == 1024
          - _ec2_instance_type_info_dict['t3.micro'].v_cpu_info.default_v_cpus == 2
          - _ec2_instance_type_info_dict['t3.small'].current_generation | bool
          - _ec2_instance_type_info_dict['t3.small'].instance_type == 't3.small'
          - _ec2_instance_type_info_dict['t3.small'].memory_info.size_in_mi_b == 2048
          - _ec2_instance_type_info_dict['t3.small'].v_cpu_info.default_v_cpus == 2

    - name: Ensure role is included with filters
      ansible.builtin.include_role:
        name: ec2_instance_type_info
      vars:
        ec2_instance_type_info_filters:
          current-generation: true
          instance-type:
            - t3.micro
          processor-info.supported-architecture:
            - x86_64

    - name: Ensure info with filters is verified
      ansible.builtin.assert:
        that:
          - _ec2_instance_type_info_list | length == 1
          - _ec2_instance_type_info_dict.keys() | list == ['t3.micro']
          - _ec2_instance_type_info_dict['t3.micro'].burstable_performance_supported | bool
          - _ec2_instance_type_info_dict['t3.micro'].current_generation | bool
          - _ec2_instance_type_info_dict[
              't3.micro'
            ].processor_info.supported_architectures == ['x86_64']
...
