---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        ec2_ami_info_list:
          - name: al2023-ami-2023
            filters:
              architecture: x86_64
              owner-alias: amazon
              is-public: true
              virtualization-type: hvm

        ec2_instance_info_filters:
          instance-state-name:
            - running

        ec2_instance_list:
          - name: molecule
            exact_count: 1
            iam_instance_profile: molecule-instance
            image_id: "{{ _ec2_ami_info_latest['al2023-ami-2023'] }}"
            instance_type: t2.medium
            security_groups:
              - molecule
            vpc_subnet_id: "{{ _ec2_vpc_subnet_info_dict['molecule-b'].id }}"

        ec2_security_group_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            security_groups:
              - name: molecule
                rules:
                  - cidr_ip: 0.0.0.0/0
                    proto: -1
                rules_egress:
                  - cidr_ip: 0.0.0.0/0
                    proto: -1

        ec2_vpc_igw_list:
          - name: molecule
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

        ec2_vpc_nat_gateway_info_filters:
          state:
            - available

        ec2_vpc_nat_gateway_list:
          - name: molecule-a
            if_exist_do_not_create: true
            release_eip: true
            subnet_id: "{{ _ec2_vpc_subnet_info_dict['molecule-a'].id }}"
            wait: true

        ec2_vpc_net_list:
          - name: molecule
            cidr_block: 192.168.0.0/24

        ec2_vpc_route_table_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            route_tables:
              - name: molecule-a
                routes:
                  - dest: '0.0.0.0/0'
                    gateway_id: igw
                subnets:
                  - "{{ _ec2_vpc_subnet_info_dict['molecule-a'].id }}"
              - name: molecule-b
                routes:
                  - dest: '0.0.0.0/0'
                    gateway_id: "{{ _ec2_vpc_nat_gateway_info_dict['molecule-a'].nat_gateway_id }}"
                subnets:
                  - "{{ _ec2_vpc_subnet_info_dict['molecule-b'].id }}"

        ec2_vpc_subnet_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            subnets:
              - name: molecule-a
                az: us-east-1a
                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(25, 0) }}"
              - name: molecule-b
                az: us-east-1b
                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(25, 1) }}"

        iam_role_list:
          - name: molecule-instance
            assume_role_policy_document:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Principal:
                    Service: ec2.amazonaws.com
                  Action:
                    - sts:AssumeRole
            managed_policies:
              - ssm-instance

        iam_instance_profile_list:
          - name: molecule-instance
            role: molecule-instance

        ssm_session_kms_key_consumers:
          - role/molecule-instance

        ssm_session_shell_profile_linux: |-
          cd

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
