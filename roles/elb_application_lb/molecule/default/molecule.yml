---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        elb_application_lb_list:
          - name: molecule-http-80
            subnets:
              - "{{ _ec2_vpc_subnet_info_dict['molecule-a'].id }}"
              - "{{ _ec2_vpc_subnet_info_dict['molecule-b'].id }}"
            listeners:
              - Protocol: HTTP
                Port: 80
                DefaultActions:
                  - Type: forward
                    TargetGroupName: molecule-http-8080
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

          - name: molecule-http-81
            rules:
              - cidr_ip: 0.0.0.0/0
                ports: 81
                proto: tcp
            rules_egress:
              - cidr_ip: "{{ ec2_vpc_net_list.0.cidr_block }}"
                proto: -1
            subnets:
              - "{{ _ec2_vpc_subnet_info_dict['molecule-a'].id }}"
              - "{{ _ec2_vpc_subnet_info_dict['molecule-b'].id }}"
            listeners:
              - Protocol: HTTP
                Port: 81
                DefaultActions:
                  - Type: forward
                    TargetGroupName: molecule-http-8081
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

        elb_target_group_list:
          - name: molecule-http-8080
            health_check_interval: 10
            health_check_path: /healthcheck
            health_check_port: 8080
            health_check_protocol: http
            healthy_threshold_count: 3
            modify_targets: false
            port: 8080
            protocol: http
            stickiness_enabled: true
            target_type: instance
            unhealthy_threshold_count: 3
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

          - name: molecule-http-8081
            health_check_interval: 10
            health_check_path: /admin
            health_check_port: 8081
            health_check_protocol: http
            healthy_threshold_count: 3
            modify_targets: false
            port: 8081
            protocol: http
            stickiness_enabled: true
            target_type: instance
            unhealthy_threshold_count: 3
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

        ec2_vpc_igw_list:
          - name: molecule
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

        ec2_vpc_net_list:
          - name: molecule
            cidr_block: 192.168.0.0/24

        ec2_vpc_subnet_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            subnets:
              - name: molecule-a
                az: us-east-1a
                cidr: 192.168.0.0/25
              - name: molecule-b
                az: us-east-1b
                cidr: 192.168.0.128/25

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
