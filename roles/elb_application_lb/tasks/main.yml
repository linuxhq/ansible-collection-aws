---
- name: Ensure aws application load balancer defaults are generated
  tags:
    - elb_application_lb
  ansible.builtin.set_fact:
    __elb_application_lb_list:
      "{{ [{'state': 'present'}] |
          product(elb_application_lb_list) |
          map('combine') |
          list }}"
    __elb_application_lb_rules:
      - cidr_ip: 0.0.0.0/0
        ports:
          - 80
          - 443
        proto: tcp
    __elb_application_lb_rules_egress:
      - cidr_ip: 0.0.0.0/0
        proto: -1

- name: Ensure aws application load balancer lists are generated
  tags:
    - elb_application_lb
  ansible.builtin.set_fact:
    __elb_application_lb_absent:
      "{{ __elb_application_lb_list |
          selectattr('state', 'equalto', 'absent') }}"
    __elb_application_lb_present:
      "{{ __elb_application_lb_list |
          selectattr('state', 'equalto', 'present') }}"

- name: Ensure aws application load balancer present tasks are included
  tags:
    - elb_application_lb
  ansible.builtin.include_tasks:
    apply:
      tags:
        - elb_application_lb
    file: present.yml
  loop: "{{ __elb_application_lb_present }}"
  loop_control:
    label: "{{ _loadbalancer.name | d(none) }}"
    loop_var: _loadbalancer
  when:
    - _loadbalancer.name is defined
    - _loadbalancer.listeners is defined
    - _loadbalancer.listeners | length > 0
    - _loadbalancer.subnets is defined
    - _loadbalancer.subnets | length > 0
    - _loadbalancer.vpc_id is defined

- name: Ensure aws application load balancer absent tasks are included
  tags:
    - elb_application_lb
  ansible.builtin.include_tasks:
    apply:
      tags:
        - elb_application_lb
    file: absent.yml
  loop: "{{ __elb_application_lb_absent }}"
  loop_control:
    label: "{{ _loadbalancer.name | d(none) }}"
    loop_var: _loadbalancer
  when:
    - _loadbalancer.name is defined
    - _loadbalancer.state == 'absent'
...
