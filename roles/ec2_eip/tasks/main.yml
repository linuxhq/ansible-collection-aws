---
- name: Ensure aws elastic ip info tasks are executed
  tags:
    - ec2_eip
  ansible.builtin.include_tasks:
    apply:
      tags:
        - ec2_eip
    file: info.yml

- name: Ensure aws elastic ip present tasks are executed
  tags:
    - ec2_eip
  ansible.builtin.include_tasks:
    apply:
      tags:
        - ec2_eip
    file: present.yml
  loop:
    "{{ ec2_eip_list |
        batch(ec2_eip_batch) }}"
  loop_control:
    label: "{{ __ec2_eip_list | length }}"
    loop_var: __ec2_eip_list

- name: Ensure aws elastic ip info tasks are executed
  tags:
    - ec2_eip
  ansible.builtin.include_tasks:
