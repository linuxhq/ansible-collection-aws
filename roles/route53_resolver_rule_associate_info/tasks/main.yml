---
- name: Ensure information about aws route53 resolver rule associations is gathered
  tags:
    - route53_resolver_rule_associate_info
  ansible.builtin.command:
    cmd: >
      aws route53resolver list-resolver-rule-associations
        --query ResolverRuleAssociations
  register: __route53_resolver_rule_associate_info_query
  changed_when: false
  check_mode: false

- name: Ensure list of aws route53 resolver rule associations is generated
  tags:
    - route53_resolver_rule_associate_info
  ansible.builtin.set_fact:
    _route53_resolver_rule_associate_info_list:
      "{{ (__route53_resolver_rule_associate_info_query.stdout |
          from_json) |
          d([]) }}"
...
