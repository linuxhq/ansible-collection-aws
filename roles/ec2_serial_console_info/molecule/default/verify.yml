---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_serial_console_info

  tasks:
    - name: Ensure ec2 serial console access is verified
      ansible.builtin.assert:
        quiet: true
        that:
          - _ec2_serial_console_info_dict[_region].serial_console_access_enabled
      loop: "{{ ec2_serial_console_info_regions }}"
      loop_control:
        label: "{{ _region }}"
        loop_var: _region

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_serial_console_state: absent

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: ec2_serial_console
...
