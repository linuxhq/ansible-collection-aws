---
- name: Ensure aws virtual private cloud prefix lists are batched
  tags:
    - ec2_vpc_prefix_list
  ansible.builtin.include_tasks:
    apply:
      tags:
        - ec2_vpc_prefix_list
    file: include.yml
  loop:
    "{{ ec2_vpc_prefix_list_entries |
        batch(ec2_vpc_prefix_list_batch) }}"
  loop_control:
    label: "{{ __ec2_vpc_prefix_list_entries | length }}"
    loop_var: __ec2_vpc_prefix_list_entries
...
