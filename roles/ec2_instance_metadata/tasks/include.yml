---
- name: Ensure aws instance metadata region defaults are managed
  tags:
    - ec2_instance_metadata
  linuxhq.aws.ec2_instance_metadata:
    http_endpoint: "{{ ec2_instance_metadata_http_endpoint }}"
    http_put_response_hop_limit: "{{ ec2_instance_metadata_http_put_response_hop_limit }}"
    http_tokens: "{{ ec2_instance_metadata_http_tokens }}"
    instance_metadata_tags: "{{ ec2_instance_metadata_instance_metadata_tags }}"
    region: "{{ _region }}"
    validate_certs: true
  register: __ec2_instance_metadata_result
  loop: "{{ __ec2_instance_metadata_regions }}"
  loop_control:
    label: "{{ _region | d(none) }}"
    loop_var: _region
  async: "{{ ansible_check_mode | ternary(0, ec2_instance_metadata_async) }}"
  poll: "{{ ec2_instance_metadata_poll }}"
  changed_when:
    - ansible_check_mode | bool
    - __ec2_instance_metadata_result.changed | bool

- name: Ensure managed aws instance metadata region jobs are complete
  tags:
    - ec2_instance_metadata
  ansible.builtin.async_status:
    jid: "{{ _jid.ansible_job_id }}"
  register: __ec2_instance_metadata_status
  loop: "{{ __ec2_instance_metadata_result.results }}"
  loop_control:
    label: "{{ _jid._region | d(none) }}"
    loop_var: _jid
  when:
    - _jid.ansible_job_id is defined
  until:
    - __ec2_instance_metadata_status.finished | bool
  retries: "{{ ec2_instance_metadata_retries }}"
  delay: "{{ ec2_instance_metadata_delay }}"
...
