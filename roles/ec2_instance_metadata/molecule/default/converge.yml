---
- name: Converge
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - role: aws_region_info
      check_mode: false

    - role: ec2_instance_metadata
      ec2_instance_metadata_http_put_response_hop_limit: 1
      ec2_instance_metadata_regions:
        - us-east-1
        - us-east-2
      tags:
        - molecule-idempotence-notest

    - ec2_instance_metadata
...
