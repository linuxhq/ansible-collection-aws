---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  pre_tasks:
    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        rds_ca_bundle_list:
          "{{ rds_ca_bundle_list |
              map('combine', {'state': 'absent'}) }}"

  roles:
    - rds_ca_bundle
...
