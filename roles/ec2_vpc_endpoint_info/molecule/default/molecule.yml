---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        ec2_vpc_endpoint_info_filters:
          vpc-endpoint-state:
            - available

        ec2_vpc_endpoint_list:
          - name: molecule
            tags:
              molecule: ec2_vpc_endpoint_info
            route_table_ids:
              - "{{ _ec2_vpc_route_table_info_dict['molecule'].id }}"
            service: com.amazonaws.us-east-1.s3
            vpc_endpoint_type: Gateway
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

        ec2_vpc_igw_list:
          - name: molecule
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

        ec2_vpc_net_list:
          - name: molecule
            cidr_block: 192.168.0.0/24

        ec2_vpc_subnet_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            subnets:
              - name: molecule
                az: us-east-1a
                cidr: "{{ ec2_vpc_net_list.0.cidr_block }}"

        ec2_vpc_route_table_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            route_tables:
              - name: molecule
                routes:
                  - dest: '0.0.0.0/0'
                    gateway_id: igw
                subnets:
                  - "{{ _ec2_vpc_subnet_info_dict['molecule'].id }}"

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
