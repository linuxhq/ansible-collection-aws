---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_vpc_igw_info
    - ec2_vpc_net_info
    - ec2_vpc_route_table_info
    - ec2_vpc_subnet_info

  post_tasks:
    - name: Ensure role is included
      ansible.builtin.include_role:
        name: ec2_vpc_endpoint_info

    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _ec2_vpc_endpoint_info_dict['molecule'].vpc_endpoint_id is defined
          - _ec2_vpc_endpoint_info_dict['molecule'].tags.molecule ==
              'ec2_vpc_endpoint_info'
          - _ec2_vpc_endpoint_info_dict['molecule'].vpc_id ==
              _ec2_vpc_net_info_dict['molecule'].id

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_endpoint_list:
          "{{ ec2_vpc_endpoint_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_igw_list:
          "{{ ec2_vpc_igw_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_route_table_list:
          "{{ ec2_vpc_route_table_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - ec2_vpc_endpoint
        - ec2_vpc_route_table
        - ec2_vpc_subnet
        - ec2_vpc_igw
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
