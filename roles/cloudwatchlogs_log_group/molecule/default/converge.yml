---
- name: Converge
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - role: cloudwatchlogs_log_group
      cloudwatchlogs_log_group_list: []
      tags:
        - molecule-idempotence-notest

    - role: cloudwatchlogs_log_group
      cloudwatchlogs_log_group_list:
        "{{ cloudwatchlogs_log_group_list_create }}"
      tags:
        - molecule-idempotence-notest

    - role: cloudwatchlogs_log_group
      cloudwatchlogs_log_group_list:
        "{{ cloudwatchlogs_log_group_list_update }}"
...
