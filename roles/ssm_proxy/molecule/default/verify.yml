---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin:/usr/bin:/usr/local/bin'

  pre_tasks:
    - name: Ensure aws session manager proxy dependencies are present
      become: true
      ansible.builtin.pip:
        name: psutil
        virtualenv: /opt/awscli

    - name: Ensure aws session manager proxy process is identified
      community.general.pids:
        pattern: session-manager-plugin
      register: __ssm_proxy_pid

    - name: Ensure aws session manager proxy process is terminated
      ansible.builtin.command:
        cmd: >
          kill -SIGTERM "{{ __ssm_proxy_pid.pids.0 }}"
      when:
        - __ssm_proxy_pid.pids.0 is defined

  roles:
    - aws_caller_info
    - aws_az_info
    - ec2_ami_info
    - ec2_vpc_nat_gateway_info
    - ec2_vpc_net_info
    - ec2_vpc_subnet_info

  post_tasks:
    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_instance_list:
          "{{ ec2_instance_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_security_group_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            security_groups:
              "{{ ec2_security_group_list.0.security_groups |
                  map('combine', {'state': 'absent'}) }}"
        ec2_vpc_igw_list:
          "{{ ec2_vpc_igw_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_nat_gateway_list:
          "{{ ec2_vpc_nat_gateway_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_route_table_list:
          "{{ ec2_vpc_route_table_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"
        iam_instance_profile_list:
          "{{ iam_instance_profile_list |
              map('combine', {'state': 'absent'}) }}"
        iam_role_list:
          "{{ iam_role_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - iam_instance_profile
        - iam_role
        - ssm_session
        - ec2_instance
        - ec2_security_group
        - ec2_vpc_route_table
        - ec2_vpc_nat_gateway
        - ec2_vpc_subnet
        - ec2_vpc_igw
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
      vars:
        ssm_session_state: absent
...
