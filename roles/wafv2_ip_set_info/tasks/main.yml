---
- name: Ensure aws wafv2 ip set information is gathered
  tags:
    - wafv2_ip_set_info
  linuxhq.aws.wafv2_ip_set_info:
    scope: "{{ wafv2_ip_set_info_scope }}"
    validate_certs: true
  register: __wafv2_ip_set_info_query

- name: Ensure list of aws wafv2 ip set information is generated
  tags:
    - wafv2_ip_set_info
  ansible.builtin.set_fact:
    _wafv2_ip_set_info_list:
      "{{ __wafv2_ip_set_info_query.ip_sets |
          d([]) }}"

- name: Ensure dict of aws wafv2 ip set information is generated
  tags:
    - wafv2_ip_set_info
  ansible.builtin.set_fact:
    _wafv2_ip_set_info_dict:
      "{{ dict(_wafv2_ip_set_info_list |
               json_query('[].name') |
               zip(_wafv2_ip_set_info_list)) }}"
...
