---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_vpc_net_info
    - ec2_vpc_subnet_info

  post_tasks:
    - name: Ensure role is included without name
      ansible.builtin.include_role:
        name: rds_subnet_group_info
      vars:
        rds_subnet_group_info_name: null

    - name: Ensure info without name is verified
      ansible.builtin.assert:
        that:
          - _rds_subnet_group_info_dict['molecule'].db_subnet_group_arn is defined
          - _rds_subnet_group_info_dict['molecule'].db_subnet_group_description == rds_subnet_group_list.0.name
          - _rds_subnet_group_info_dict['molecule'].db_subnet_group_name == rds_subnet_group_list.0.name
          - (_rds_subnet_group_info_dict['molecule'].subnets |
             map(attribute='subnet_identifier') |
             sort) == (rds_subnet_group_list.0.subnets | sort)
          - _rds_subnet_group_info_dict['molecule'].vpc_id == _ec2_vpc_net_info_dict['molecule'].id

    - name: Ensure role is included with name
      ansible.builtin.include_role:
        name: rds_subnet_group_info
      vars:
        rds_subnet_group_info_name: molecule

    - name: Ensure info with name is verified
      ansible.builtin.assert:
        that:
          - _rds_subnet_group_info_list | length == 1
          - _rds_subnet_group_info_list.0.db_subnet_group_name == rds_subnet_group_list.0.name
          - _rds_subnet_group_info_dict.keys() | list == [rds_subnet_group_list.0.name]
          - _rds_subnet_group_info_dict['molecule'].db_subnet_group_arn is defined

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"
        rds_subnet_group_list:
          "{{ rds_subnet_group_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - rds_subnet_group
        - ec2_vpc_subnet
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
