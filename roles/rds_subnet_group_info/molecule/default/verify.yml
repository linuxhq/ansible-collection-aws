---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_vpc_net_info
    - ec2_vpc_subnet_info
    - rds_subnet_group_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _rds_subnet_group_info_dict['molecule'].DBSubnetGroupArn is defined
          - _rds_subnet_group_info_dict['molecule'].DBSubnetGroupDescription == rds_subnet_group_list.0.name
          - _rds_subnet_group_info_dict['molecule'].DBSubnetGroupName == rds_subnet_group_list.0.name
          - _rds_subnet_group_info_dict['molecule'].Subnets.0.SubnetIdentifier == rds_subnet_group_list.0.subnets.1
          - _rds_subnet_group_info_dict['molecule'].Subnets.1.SubnetIdentifier == rds_subnet_group_list.0.subnets.0
          - _rds_subnet_group_info_dict['molecule'].VpcId == _ec2_vpc_net_info_dict['molecule'].id

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"
        rds_subnet_group_list:
          "{{ rds_subnet_group_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _role }}"
      loop:
        - rds_subnet_group
        - ec2_vpc_subnet
        - ec2_vpc_net
      loop_control:
        label: "{{ _role }}"
        loop_var: _role
...
