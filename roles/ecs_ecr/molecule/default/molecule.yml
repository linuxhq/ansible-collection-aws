---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        ecs_ecr_list:
          - name: molecule-00
            image_tag_mutability: immutable
            scan_on_push: true
          - name: molecule-01
            image_tag_mutability: immutable
            scan_on_push: true
          - name: molecule-02
            image_tag_mutability: immutable
            scan_on_push: true
          - name: molecule-03
            image_tag_mutability: immutable
            scan_on_push: true
          - name: molecule-04
            image_tag_mutability: immutable
            scan_on_push: true
          - name: molecule-05
            image_tag_mutability: immutable
            scan_on_push: true
          - name: molecule-06
            image_tag_mutability: immutable
            scan_on_push: true
          - name: molecule-07
            image_tag_mutability: immutable
            scan_on_push: true
          - name: molecule-08
            image_tag_mutability: immutable
            scan_on_push: true
          - name: molecule-09
            image_tag_mutability: immutable
            scan_on_push: true
          - name: molecule-10
            image_tag_mutability: immutable
            scan_on_push: true
          - name: molecule-11
            image_tag_mutability: immutable
            scan_on_push: true

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
