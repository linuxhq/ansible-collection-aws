---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python

        pinpoint_sms_voice_phone_number_list:
          - name: molecule-pinpoint-simulator-1
            iso_country_code: US
            message_type: TRANSACTIONAL
            number_capabilities:
              - SMS
            number_type: SIMULATOR

          - name: molecule-pinpoint-simulator-2
            iso_country_code: US
            message_type: TRANSACTIONAL
            number_capabilities:
              - SMS
            number_type: SIMULATOR

        pinpoint_sms_voice_phone_pool_list:
          - name: molecule-pinpoint-pool
            origination_identity:
              "{{ _pinpoint_sms_voice_phone_number_info_dict[
                    'molecule-pinpoint-simulator-1'
                  ].phone_number_id }}"
            iso_country_code: US
            message_type: TRANSACTIONAL

        pinpoint_sms_voice_phone_pool_associate_list:
          - pool_id:
              "{{ _pinpoint_sms_voice_phone_pool_info_dict['molecule-pinpoint-pool'].pool_id }}"
            iso_country_code: US
            associations:
              - origination_identity:
                  "{{ _pinpoint_sms_voice_phone_number_info_dict[
                        'molecule-pinpoint-simulator-1'
                      ].phone_number_id }}"
              - origination_identity:
                  "{{ _pinpoint_sms_voice_phone_number_info_dict[
                        'molecule-pinpoint-simulator-2'
                      ].phone_number_id }}"

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
