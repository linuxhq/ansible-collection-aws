---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_transit_gateway_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _ec2_transit_gateway_info_dict['molecule-00'].transit_gateway_id is defined
          - _ec2_transit_gateway_info_dict['molecule-00'].tags.molecule == 'ec2_transit_gateway_info'
          - _ec2_transit_gateway_info_dict['molecule-01'].transit_gateway_id is defined
          - _ec2_transit_gateway_info_dict['molecule-02'].transit_gateway_id is defined
          - _ec2_transit_gateway_info_dict['molecule-03'].transit_gateway_id is defined
          - _ec2_transit_gateway_info_dict['molecule-04'].transit_gateway_id is defined

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_transit_gateway_list:
          "{{ ec2_transit_gateway_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - ec2_transit_gateway
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
