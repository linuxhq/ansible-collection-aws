---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python

        iam_role_list:
          - name: MoleculeEksClusterRole
            assume_role_policy_document:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Principal:
                    Service: eks.amazonaws.com
                  Action:
                    - sts:AssumeRole
            create_instance_profile: false
            delete_instance_profile: true
            managed_policies:
              - AmazonEKSClusterPolicy
              - AmazonS3FullAccess

        ec2_vpc_net_list:
          - name: molecule
            cidr_block: 10.0.0.0/16

        ec2_vpc_subnet_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            subnets:
              - name: molecule-a
                az: us-east-1a
                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(24,0) }}"
              - name: molecule-c
                az: us-east-1c
                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(24,1) }}"
              - name: molecule-d
                az: us-east-1d
                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(24,2) }}"

        ec2_security_group_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            security_groups:
              - name: molecule-eks
                rules:
                  - cidr_ip: 0.0.0.0/0
                    ports:
                      - 443
                    proto: tcp
                rules_egress:
                  - cidr_ip: 0.0.0.0/0
                    proto: -1

        eks_cluster_list:
          - name: molecule-eks1
            tags:
              molecule: eks_cluster_info
            resources_vpc_config:
              endpoint_private_access: false
              endpoint_public_access: true
              public_access_cidrs:
                - 69.107.10.200/29
              security_group_ids:
                - "{{ _ec2_security_group_info_dict['molecule-eks'].group_id }}"
              subnet_ids:
                - "{{ _ec2_vpc_subnet_info_dict['molecule-a'].id }}"
                - "{{ _ec2_vpc_subnet_info_dict['molecule-c'].id }}"
                - "{{ _ec2_vpc_subnet_info_dict['molecule-d'].id }}"
            role_arn: "arn:aws:iam::{{ _aws_caller_info_account }}:role/MoleculeEksClusterRole"
            version: '1.34'
            wait: true

          - name: molecule-eks2
            resources_vpc_config:
              endpoint_private_access: true
              endpoint_public_access: false
              security_group_ids:
                - "{{ _ec2_security_group_info_dict['molecule-eks'].group_id }}"
              subnet_ids:
                - "{{ _ec2_vpc_subnet_info_dict['molecule-a'].id }}"
                - "{{ _ec2_vpc_subnet_info_dict['molecule-c'].id }}"
                - "{{ _ec2_vpc_subnet_info_dict['molecule-d'].id }}"
            role_arn: "arn:aws:iam::{{ _aws_caller_info_account }}:role/MoleculeEksClusterRole"
            version: '1.35'
            wait: true

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
