---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_vpc_net_info
    - ec2_vpc_vgw_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _ec2_vpc_vgw_info_dict['molecule'].state == 'available'
          - _ec2_vpc_vgw_info_dict['molecule'].resource_tags.Name == 'molecule'
          - _ec2_vpc_vgw_info_dict['molecule'].resource_tags.molecule == 'ec2_vpc_vgw_info'
          - _ec2_vpc_vgw_info_dict['molecule'].type == 'ipsec.1'
          - _ec2_vpc_vgw_info_dict['molecule'].vpn_gateway_id is defined
          - _ec2_vpc_vgw_info_dict['molecule'].vpc_attachments.0.state == 'attached'
          - _ec2_vpc_vgw_info_dict['molecule'].vpc_attachments.0.vpc_id ==
              _ec2_vpc_net_info_dict[ec2_vpc_net_list.0.name].id

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_vgw_list:
          "{{ ec2_vpc_vgw_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - ec2_vpc_vgw
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
