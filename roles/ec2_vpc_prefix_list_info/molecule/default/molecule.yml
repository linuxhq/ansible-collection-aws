---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        ec2_vpc_prefix_list_entries:
          - name: molecule-localhost
            entries:
              - cidr: 127.0.0.1/32
                description: localhost-1
              - cidr: 127.0.0.2/32
                description: localhost-2
              - cidr: 127.0.0.3/32
                description: localhost-3
              - cidr: 127.0.0.4/32
                description: localhost-4
              - cidr: 127.0.0.5/32
                description: localhost-5
          - name: molecule-private
            entries:
              - cidr: 192.168.1.0/24
                description: private-1
              - cidr: 192.168.2.0/24
                description: private-2
              - cidr: 192.168.3.0/24
                description: private-3
              - cidr: 192.168.4.0/24
                description: private-4
              - cidr: 192.168.5.0/24
                description: private-5

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
