---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  tasks:
    - name: Ensure role is included without name
      ansible.builtin.include_role:
        name: ec2_vpc_prefix_list_info
      vars:
        ec2_vpc_prefix_list_info_name: null

    - name: Ensure info without name is verified
      ansible.builtin.assert:
        that:
          - _ec2_vpc_prefix_list_info_dict['molecule-localhost'].entries | length == 5
          - _ec2_vpc_prefix_list_info_dict['molecule-localhost'].prefix_list_id is defined
          - _ec2_vpc_prefix_list_info_dict['molecule-localhost'].prefix_list_name == 'molecule-localhost'
          - _ec2_vpc_prefix_list_info_dict['molecule-private'].entries | length == 5
          - _ec2_vpc_prefix_list_info_dict['molecule-private'].prefix_list_id is defined
          - _ec2_vpc_prefix_list_info_dict['molecule-private'].prefix_list_name == 'molecule-private'

    - name: Ensure role is included with name
      ansible.builtin.include_role:
        name: ec2_vpc_prefix_list_info
      vars:
        ec2_vpc_prefix_list_info_name: molecule-localhost

    - name: Ensure info with name is verified
      ansible.builtin.assert:
        that:
          - _ec2_vpc_prefix_list_info_list | length == 1
          - _ec2_vpc_prefix_list_info_list.0.prefix_list_name == 'molecule-localhost'
          - _ec2_vpc_prefix_list_info_dict.keys() | list == ['molecule-localhost']
          - _ec2_vpc_prefix_list_info_dict['molecule-localhost'].entries | length == 5

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_prefix_list_entries:
          "{{ ec2_vpc_prefix_list_entries |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - ec2_vpc_prefix_list
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
