---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  tasks:
    - name: Ensure role is included without filters
      ansible.builtin.include_role:
        name: ec2_pricing_info

    - name: Ensure empty filters return empty products
      ansible.builtin.assert:
        that:
          - _ec2_pricing_info_list == []
          - _ec2_pricing_info_dict == {}

    - name: Ensure role is included with default pricing endpoint
      ansible.builtin.include_role:
        name: ec2_pricing_info
      vars:
        ec2_pricing_info_filters:
          - field: instanceType
            value: t3.micro
          - field: regionCode
            value: us-east-1
          - field: operatingSystem
            value: Linux
          - field: tenancy
            value: Shared
          - field: preInstalledSw
            value: NA

    - name: Ensure default endpoint info is verified
      ansible.builtin.assert:
        that:
          - _ec2_pricing_info_list | length >= 1
          - _ec2_pricing_info_dict | length == _ec2_pricing_info_list | length
          - _ec2_pricing_info_dict[
              _ec2_pricing_info_list[0].product.sku
            ] == _ec2_pricing_info_list[0]
          - _ec2_pricing_info_list[0].service_code == 'AmazonEC2'
          - _ec2_pricing_info_list[0].product.attributes.instance_type == 't3.micro'
          - _ec2_pricing_info_list[0].product.attributes.region_code == 'us-east-1'
          - _ec2_pricing_info_list[0].product.attributes.operating_system == 'Linux'
          - _ec2_pricing_info_list[0].product.attributes.tenancy == 'Shared'

    - name: Ensure role is included with regional product pricing
      ansible.builtin.include_role:
        name: ec2_pricing_info
      vars:
        ec2_pricing_info_filters:
          - field: instanceType
            value: t3.micro
          - field: regionCode
            value: us-west-2
          - field: operatingSystem
            value: Linux
          - field: tenancy
            value: Shared
          - field: preInstalledSw
            value: NA

    - name: Ensure regional product pricing is verified
      ansible.builtin.assert:
        that:
          - _ec2_pricing_info_list | length >= 1
          - _ec2_pricing_info_dict[
              _ec2_pricing_info_list[0].product.sku
            ] == _ec2_pricing_info_list[0]
          - _ec2_pricing_info_list[0].service_code == 'AmazonEC2'
          - _ec2_pricing_info_list[0].product.attributes.instance_type == 't3.micro'
          - _ec2_pricing_info_list[0].product.attributes.region_code == 'us-west-2'
          - _ec2_pricing_info_list[0].product.attributes.operating_system == 'Linux'
          - _ec2_pricing_info_list[0].product.attributes.tenancy == 'Shared'
...
