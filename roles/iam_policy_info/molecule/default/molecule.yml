---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        iam_group_list:
          - name: molecule-ec2
          - name: molecule-rds

        iam_policy_list:
          - iam_name: molecule-ec2
            iam_type: user
            policy_json:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - ec2:*
                  Resource:
                    - '*'
            policy_name: MoleculeEc2FullAccess

          - iam_name: molecule-rds
            iam_type: group
            policy_json:
              Version: '2012-10-17'
              Statement:
                - Effect: Allow
                  Action:
                    - rds:*
                  Resource:
                    - '*'
            policy_name: MoleculeRdsFullAccess

        iam_user_list:
          - name: molecule-ec2
          - name: molecule-rds

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
