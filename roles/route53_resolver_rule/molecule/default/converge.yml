---
- name: Converge
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - role: ec2_vpc_net
      tags:
        - molecule-idempotence-notest
      check_mode: false

    - role: ec2_vpc_subnet
      tags:
        - molecule-idempotence-notest
      check_mode: false

    - role: route53_resolver
      tags:
        - molecule-idempotence-notest
      check_mode: false

    - role: route53_resolver_rule
      route53_resolver_rule_list: []
      tags:
        - molecule-idempotence-notest

    - route53_resolver_rule
...
