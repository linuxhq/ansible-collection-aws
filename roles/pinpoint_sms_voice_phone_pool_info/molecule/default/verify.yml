---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - pinpoint_sms_voice_phone_number_info

  post_tasks:
    - name: Ensure role is included without filters
      ansible.builtin.include_role:
        name: pinpoint_sms_voice_phone_pool_info

    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _pinpoint_sms_voice_phone_pool_info_dict['molecule-pinpoint-pool'].message_type ==
              'TRANSACTIONAL'
          - _pinpoint_sms_voice_phone_pool_info_dict['molecule-pinpoint-pool'].origination_identities |
              length == 1
          - _pinpoint_sms_voice_phone_pool_info_dict['molecule-pinpoint-pool'].pool_arn is defined
          - _pinpoint_sms_voice_phone_pool_info_dict['molecule-pinpoint-pool'].pool_id is defined
          - _pinpoint_sms_voice_phone_pool_info_dict['molecule-pinpoint-pool'].status == 'ACTIVE'
          - _pinpoint_sms_voice_phone_pool_info_dict['molecule-pinpoint-pool'].tags.molecule ==
              'pinpoint_sms_voice_phone_pool_info'

    - name: Ensure pool id filter target is generated
      ansible.builtin.set_fact:
        pinpoint_sms_voice_phone_pool_info_id_filter:
          "{{ _pinpoint_sms_voice_phone_pool_info_dict['molecule-pinpoint-pool'].pool_id }}"

    - name: Ensure role is included with pool id
      ansible.builtin.include_role:
        name: pinpoint_sms_voice_phone_pool_info
      vars:
        pinpoint_sms_voice_phone_pool_info_pool_ids:
          - "{{ pinpoint_sms_voice_phone_pool_info_id_filter }}"

    - name: Ensure info with pool id is verified
      ansible.builtin.assert:
        that:
          - _pinpoint_sms_voice_phone_pool_info_list | length == 1
          - _pinpoint_sms_voice_phone_pool_info_list.0.pool_id ==
              pinpoint_sms_voice_phone_pool_info_id_filter

    - name: Ensure role is included with filters
      ansible.builtin.include_role:
        name: pinpoint_sms_voice_phone_pool_info
      vars:
        pinpoint_sms_voice_phone_pool_info_filters:
          message-type: TRANSACTIONAL

    - name: Ensure info with filters is verified
      ansible.builtin.assert:
        that:
          - _pinpoint_sms_voice_phone_pool_info_dict['molecule-pinpoint-pool'].pool_id is defined

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        pinpoint_sms_voice_phone_number_list:
          "{{ pinpoint_sms_voice_phone_number_list |
              map('combine',
                  {'phone_number_id':
                   _pinpoint_sms_voice_phone_number_info_list.0.phone_number_id,
                   'state':
                   'absent'}) }}"
        pinpoint_sms_voice_phone_pool_list:
          "{{ pinpoint_sms_voice_phone_pool_list |
              map('combine',
                  {'pool_id':
                   _pinpoint_sms_voice_phone_pool_info_list.0.pool_id,
                   'state':
                   'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - pinpoint_sms_voice_phone_pool
        - pinpoint_sms_voice_phone_number
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
