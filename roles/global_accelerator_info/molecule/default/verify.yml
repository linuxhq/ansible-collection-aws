---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_vpc_net_info
    - ec2_vpc_subnet_info
    - elb_application_lb_info

  post_tasks:
    - name: Ensure role is included without arn
      ansible.builtin.include_role:
        name: global_accelerator_info

    - name: Ensure info without arn is verified
      ansible.builtin.assert:
        that:
          - _global_accelerator_info_dict['molecule-global-accelerator-info-00'].accelerator_arn is defined
          - _global_accelerator_info_dict['molecule-global-accelerator-info-00'].dns_name is defined
          - not (_global_accelerator_info_dict['molecule-global-accelerator-info-00'].enabled | bool)
          - _global_accelerator_info_dict['molecule-global-accelerator-info-00'].ip_address_type == 'IPV4'
          - _global_accelerator_info_dict['molecule-global-accelerator-info-00'].status == 'DEPLOYED'
          - _global_accelerator_info_dict['molecule-global-accelerator-info-00'].tags.molecule ==
              'global_accelerator_info'
          - _global_accelerator_info_dict['molecule-global-accelerator-info-01'].accelerator_arn is defined
          - _global_accelerator_info_dict['molecule-global-accelerator-info-01'].dns_name is defined
          - not (_global_accelerator_info_dict['molecule-global-accelerator-info-01'].enabled | bool)
          - _global_accelerator_info_dict['molecule-global-accelerator-info-01'].ip_address_type == 'IPV4'
          - _global_accelerator_info_dict['molecule-global-accelerator-info-01'].status == 'DEPLOYED'
          - _global_accelerator_info_dict['molecule-global-accelerator-info-01'].tags.molecule ==
              'global_accelerator_info'

    - name: Ensure accelerator arn filter target is generated
      ansible.builtin.set_fact:
        global_accelerator_info_arn_filter:
          "{{ _global_accelerator_info_dict[
                'molecule-global-accelerator-info-00'
              ].accelerator_arn }}"

    - name: Ensure role is included with one arn
      ansible.builtin.include_role:
        name: global_accelerator_info
      vars:
        global_accelerator_info_arn: "{{ global_accelerator_info_arn_filter }}"

    - name: Ensure info with one arn is verified
      ansible.builtin.assert:
        that:
          - _global_accelerator_info_list | length == 1
          - _global_accelerator_info_list.0.accelerator_arn ==
              global_accelerator_info_arn_filter
          - _global_accelerator_info_dict.keys() | list ==
              ['molecule-global-accelerator-info-00']

    - name: Ensure role is included with endpoint groups
      ansible.builtin.include_role:
        name: global_accelerator_info
      vars:
        global_accelerator_info_include_endpoint_groups: true

    - name: Ensure info with endpoint groups is verified
      ansible.builtin.assert:
        that:
          - _global_accelerator_info_dict['molecule-global-accelerator-info-00'].listeners | length == 2
          - _global_accelerator_info_dict['molecule-global-accelerator-info-00'].listeners |
              json_query('[].protocol') | unique == ['TCP']
          - __global_accelerator_info_listener_444.endpoint_groups | length == 1
          - __global_accelerator_info_listener_444.endpoint_groups.0.endpoint_group_region == 'us-west-2'
          - __global_accelerator_info_listener_444.endpoint_groups.0.traffic_dial_percentage == 50
          - __global_accelerator_info_listener_444.endpoint_groups.0.endpoint_descriptions | length == 1
          - __global_accelerator_info_listener_444.endpoint_groups.0.endpoint_descriptions.0.endpoint_id ==
              _elb_application_lb_info_dict['molecule-http-80'].load_balancer_arn
          - __global_accelerator_info_listener_444.endpoint_groups.0.endpoint_descriptions.0.weight == 200
          - _global_accelerator_info_dict['molecule-global-accelerator-info-01'].listeners | length == 0
      vars:
        __global_accelerator_info_listener_444:
          "{{ _global_accelerator_info_dict['molecule-global-accelerator-info-00'].listeners |
              selectattr('port_ranges.0.from_port', 'equalto', 444) |
              first }}"

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_igw_list:
          "{{ ec2_vpc_igw_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"
        elb_application_lb_list:
          "{{ elb_application_lb_list |
              map('combine', {'state': 'absent'}) }}"
        elb_target_group_list:
          "{{ elb_target_group_list |
              map('combine', {'state': 'absent'}) }}"
        global_accelerator_list:
          "{{ global_accelerator_list_update |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure network interface owning roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - global_accelerator
        - elb_application_lb
        - elb_target_group
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify

    - name: Ensure aws network interfaces are released
      amazon.aws.ec2_eni_info:
        filters:
          vpc-id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
        validate_certs: true
      register: __global_accelerator_eni_info
      delay: 15
      retries: 40
      until:
        - __global_accelerator_eni_info.network_interfaces | length == 0

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - ec2_vpc_subnet
        - ec2_vpc_igw
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
