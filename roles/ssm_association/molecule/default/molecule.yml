---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        ssm_association_list:
          - name: AWS-UpdateSSMAgent
            schedule_expression: 'cron(0 0 * * ? *)'
            targets:
              - key: InstanceIds
                values: ['*']

        ssm_association_updated_list:
          - name: AWS-UpdateSSMAgent
            schedule_expression: 'cron(15 0 * * ? *)'
            targets:
              - key: InstanceIds
                values: ['*']

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
