---
- name: Converge
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - role: profile
      tags:
        - molecule-idempotence-notest

    - role: profile
      profile_list:
        - name: default
          config:
            output: json
            region: us-east-1
          credentials:
            aws_access_key_id:
              "{{ lookup('ansible.builtin.ini',
                         'aws_access_key_id',
                         file='~/.aws/credentials',
                         section='default') }}"
            aws_secret_access_key:
              "{{ lookup('ansible.builtin.ini',
                         'aws_secret_access_key',
                         file='~/.aws/credentials',
                         section='default') }}"

        - name: dummy
          config:
            output: yaml
            region: us-west-1
          credentials:
            aws_access_key_id: DUMMY012345678901234
            aws_secret_access_key: DuMmYDuMmYDuMmYDuMmYDuMmYDuMmYDuMmYDuMmY
...
