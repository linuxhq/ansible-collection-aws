---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python

        ec2_vpc_net_list:
          - name: molecule
            cidr_block: 10.0.0.0/16

        ec2_vpc_subnet_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            subnets:
              - name: molecule
                az: us-east-1a
                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(24, 0) }}"

        ec2_transit_gateway_info_filters:
          state:
            - available

        ec2_transit_gateway_list:
          - name: molecule

        ec2_transit_gateway_vpc_attachment_list:
          - name: molecule
            subnets:
              - "{{ _ec2_vpc_subnet_info_dict['molecule'].id }}"
            transit_gateway: "{{ _ec2_transit_gateway_info_dict['molecule'].transit_gateway_id }}"

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
