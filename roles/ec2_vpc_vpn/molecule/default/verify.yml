---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_customer_gateway_info
    - ec2_transit_gateway_info

  post_tasks:
    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_vpn_list:
          "{{ ec2_vpc_vpn_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_transit_gateway_list:
          "{{ ec2_transit_gateway_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_customer_gateway_list:
          "{{ ec2_customer_gateway_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure role is included
      ansible.builtin.include_role:
        name: ec2_vpc_vpn

    - name: Ensure pause is executed
      ansible.builtin.pause:
        seconds: 300

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - ec2_transit_gateway
        - ec2_customer_gateway
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
