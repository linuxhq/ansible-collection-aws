---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_vpc_net_info
    - ec2_vpc_subnet_info
    - elb_application_lb_info

  post_tasks:
    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_igw_list:
          "{{ ec2_vpc_igw_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"
        elb_application_lb_list:
          "{{ elb_application_lb_list |
              map('combine', {'state': 'absent'}) }}"
        elb_target_group_list:
          "{{ elb_target_group_list |
              map('combine', {'state': 'absent'}) }}"
        global_accelerator_list:
          "{{ global_accelerator_list_update |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure network interface owning roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - global_accelerator
        - elb_application_lb
        - elb_target_group
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify

    - name: Ensure aws network interfaces are released
      amazon.aws.ec2_eni_info:
        filters:
          vpc-id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
        validate_certs: true
      register: __global_accelerator_eni_info
      delay: 15
      retries: 40
      until:
        - __global_accelerator_eni_info.network_interfaces | length == 0

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - ec2_vpc_subnet
        - ec2_vpc_igw
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
