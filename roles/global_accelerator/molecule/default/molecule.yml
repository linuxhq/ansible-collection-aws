---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python

        ec2_vpc_igw_list:
          - name: molecule
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

        ec2_vpc_net_list:
          - name: molecule
            cidr_block: 192.168.0.0/24

        ec2_vpc_subnet_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            subnets:
              - name: molecule-a
                az: us-west-2a
                cidr: 192.168.0.0/25
              - name: molecule-b
                az: us-west-2b
                cidr: 192.168.0.128/25

        elb_application_lb_list:
          - name: molecule-http-80
            subnets:
              - "{{ _ec2_vpc_subnet_info_dict['molecule-a'].id }}"
              - "{{ _ec2_vpc_subnet_info_dict['molecule-b'].id }}"
            listeners:
              - Protocol: HTTP
                Port: 80
                DefaultActions:
                  - Type: forward
                    TargetGroupName: molecule-http-8080
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

        elb_target_group_list:
          - name: molecule-http-8080
            health_check_interval: 10
            health_check_path: /healthcheck
            health_check_port: 8080
            health_check_protocol: http
            healthy_threshold_count: 3
            modify_targets: false
            port: 8080
            protocol: http
            stickiness_enabled: true
            target_type: instance
            unhealthy_threshold_count: 3
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"

        global_accelerator_list_create:
          - name: molecule-global-accelerator-00
            enabled: true
            tags:
              Environment: molecule
            listeners:
              - protocol: TCP
                port_ranges:
                  - from_port: 80
                    to_port: 80
              - protocol: TCP
                port_ranges:
                  - from_port: 443
                    to_port: 443
                endpoint_groups:
                  - endpoint_group_region: us-west-2
                    traffic_dial_percentage: 100
                    endpoint_configurations:
                      - endpoint_id:
                          "{{ _elb_application_lb_info_dict[
                                'molecule-http-80'
                              ].load_balancer_arn }}"
          - name: molecule-global-accelerator-01
            enabled: true
            tags:
              Environment: molecule
            listeners:
              - protocol: TCP
                port_ranges:
                  - from_port: 8080
                    to_port: 8080

        global_accelerator_list_update:
          - name: molecule-global-accelerator-00
            enabled: false
            tags:
              Environment: molecule
            listeners:
              - protocol: TCP
                port_ranges:
                  - from_port: 81
                    to_port: 81
                endpoint_groups: []
              - protocol: TCP
                port_ranges:
                  - from_port: 444
                    to_port: 444
                endpoint_groups:
                  - endpoint_group_region: us-west-2
                    traffic_dial_percentage: 50
                    endpoint_configurations:
                      - endpoint_id:
                          "{{ _elb_application_lb_info_dict[
                                'molecule-http-80'
                              ].load_balancer_arn }}"
                        weight: 200
          - name: molecule-global-accelerator-01
            enabled: false
            tags:
              Environment: molecule
            listeners: []

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
