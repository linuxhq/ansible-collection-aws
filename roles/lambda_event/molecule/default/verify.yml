---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - aws_az_info
    - aws_caller_info

  post_tasks:
    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        lambda_event_list:
          "{{ lambda_event_list |
              map('combine', {'state': 'absent'}) }}"
        lambda_list:
          "{{ lambda_list |
              map('combine', {'state': 'absent'}) }}"
        iam_role_list:
          "{{ iam_role_list |
              map('combine', {'state': 'absent'}) }}"
        sqs_queue_list:
          "{{ sqs_queue_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - lambda_event
        - lambda
        - sqs_queue
        - iam_role
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
