---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_customer_gateway_info
    - ec2_transit_gateway_info
    - ec2_vpc_vpn_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _ec2_vpc_vpn_info_dict['molecule-00'].vpn_connection_id is defined
          - _ec2_vpc_vpn_info_dict['molecule-00'].customer_gateway_id == ec2_vpc_vpn_list.0.customer_gateway_id
          - _ec2_vpc_vpn_info_dict['molecule-00'].transit_gateway_id == ec2_vpc_vpn_list.0.transit_gateway_id
          - _ec2_vpc_vpn_info_dict['molecule-01'].vpn_connection_id is defined
          - _ec2_vpc_vpn_info_dict['molecule-01'].customer_gateway_id == ec2_vpc_vpn_list.1.customer_gateway_id
          - _ec2_vpc_vpn_info_dict['molecule-01'].options.tunnel_options.0.ike_versions.0.value == 'ikev2'
          - _ec2_vpc_vpn_info_dict['molecule-01'].options.tunnel_options.0.phase1_encryption_algorithms.0.value == 'AES256'
          - _ec2_vpc_vpn_info_dict['molecule-01'].options.tunnel_options.0.phase1_integrity_algorithms.0.value == 'SHA2-256'
          - _ec2_vpc_vpn_info_dict['molecule-01'].options.tunnel_options.0.phase1_dh_group_numbers.0.value == 16
          - _ec2_vpc_vpn_info_dict['molecule-01'].options.tunnel_options.0.phase2_encryption_algorithms.0.value == 'AES256'
          - _ec2_vpc_vpn_info_dict['molecule-01'].options.tunnel_options.0.phase2_integrity_algorithms.0.value == 'SHA2-256'
          - _ec2_vpc_vpn_info_dict['molecule-01'].options.tunnel_options.0.phase2_dh_group_numbers.0.value == 16
          - _ec2_vpc_vpn_info_dict['molecule-01'].options.tunnel_options.1.ike_versions.0.value == 'ikev2'
          - _ec2_vpc_vpn_info_dict['molecule-01'].options.tunnel_options.1.phase1_encryption_algorithms.0.value == 'AES256'
          - _ec2_vpc_vpn_info_dict['molecule-01'].options.tunnel_options.1.phase1_integrity_algorithms.0.value == 'SHA2-256'
          - _ec2_vpc_vpn_info_dict['molecule-01'].options.tunnel_options.1.phase1_dh_group_numbers.0.value == 16
          - _ec2_vpc_vpn_info_dict['molecule-01'].options.tunnel_options.1.phase2_encryption_algorithms.0.value == 'AES256'
          - _ec2_vpc_vpn_info_dict['molecule-01'].options.tunnel_options.1.phase2_integrity_algorithms.0.value == 'SHA2-256'
          - _ec2_vpc_vpn_info_dict['molecule-01'].options.tunnel_options.1.phase2_dh_group_numbers.0.value == 16
          - _ec2_vpc_vpn_info_dict['molecule-01'].transit_gateway_id == ec2_vpc_vpn_list.1.transit_gateway_id

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_vpn_list:
          "{{ ec2_vpc_vpn_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_transit_gateway_list:
          "{{ ec2_transit_gateway_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_customer_gateway_list:
          "{{ ec2_customer_gateway_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure role is included
      ansible.builtin.include_role:
        name: ec2_vpc_vpn

    - name: Ensure pause is executed
      ansible.builtin.pause:
        seconds: 300

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - ec2_transit_gateway
        - ec2_customer_gateway
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
