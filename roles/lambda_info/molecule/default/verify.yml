---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - aws_caller_info
    - lambda_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _lambda_info_dict['molecule-pass'].architectures.0 == lambda_list.0.architecture
          - _lambda_info_dict['molecule-pass'].description == lambda_list.0.name
          - _lambda_info_dict['molecule-pass'].environment.variables.MOLECULE == lambda_list.0.environment_variables.MOLECULE
          - _lambda_info_dict['molecule-pass'].function_arn is defined
          - _lambda_info_dict['molecule-pass'].function_name == lambda_list.0.name
          - _lambda_info_dict['molecule-pass'].memory_size == lambda_list.0.memory_size
          - _lambda_info_dict['molecule-pass'].role == lambda_list.0.role
          - _lambda_info_dict['molecule-pass'].runtime == lambda_list.0.runtime
          - _lambda_info_dict['molecule-pass'].tracing_config.mode == lambda_list.0.tracing_mode

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        lambda_list:
          "{{ lambda_list |
              map('combine', {'state': 'absent'}) }}"
        iam_role_list:
          "{{ iam_role_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - lambda
        - iam_role
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
