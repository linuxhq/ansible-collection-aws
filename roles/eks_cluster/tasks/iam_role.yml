---
- name: Ensure elastic kubernetes service iam role is managed
  tags:
    - eks_cluster
  amazon.aws.iam_role:
    assume_role_policy_document:
      Version: '2012-10-17'
      Statement:
        - Effect: Allow
          Principal:
            Service: eks.amazonaws.com
          Action:
            - sts:AssumeRole
    create_instance_profile: true
    delete_instance_profile: true
    description: "{{ _cluster.description | d(_cluster.name) }}"
    managed_policies: "{{ _cluster.iam_managed_policies | d(['AmazonEKSClusterPolicy']) }}"
    name: "{{ _cluster.iam_role_name | d(_cluster.name) }}"
    purge_policies: true
    purge_tags: true
    state: "{{ _cluster.state | d('present') }}"
    tags:
      "{{ _cluster.tags |
          d({}) |
          combine({'Name': _cluster.name}) }}"
    validate_certs: true
  register: __eks_cluster_iam_role_result

- name: Ensure string of elastic kubernetes service iam role arn is generated
  tags:
    - eks_cluster
  ansible.builtin.set_fact:
    __eks_cluster_iam_role_arn:
      "{{ __eks_cluster_iam_role_result.iam_role.arn }}"
  when:
    - _cluster.state == 'present'
    - not ansible_check_mode
...
