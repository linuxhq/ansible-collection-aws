---
- name: Converge
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - aws_caller_info

    - role: iam_role
      tags:
        - molecule-idempotence-notest
      check_mode: false

    - role: ec2_vpc_net
      tags:
        - molecule-idempotence-notest
      check_mode: false

    - role: ec2_vpc_subnet
      tags:
        - molecule-idempotence-notest
      check_mode: false

    - role: ec2_security_group
      tags:
        - molecule-idempotence-notest
      check_mode: false

    - role: eks_cluster
      eks_cluster_list: []
      tags:
        - molecule-idempotence-notest

    - role: eks_cluster
      eks_cluster_list:
        "{{ eks_cluster_list_create }}"
      tags:
        - molecule-idempotence-notest

    - role: eks_cluster
      eks_cluster_list:
        "{{ eks_cluster_list_update }}"
...
