---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        ec2_vpc_net_list:
          - name: molecule
            cidr_block: 192.168.0.0/24

        ec2_vpc_subnet_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            subnets:
              - name: molecule-a
                az:
                  "{{ lookup('ansible.builtin.ini',
                             'region',
                             file='~/.aws/config',
                             section='profile molecule') ~ 'a' }}"
                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(25,0) }}"
              - name: molecule-b
                az:
                  "{{ lookup('ansible.builtin.ini',
                             'region',
                             file='~/.aws/config',
                             section='profile molecule') ~ 'b' }}"
                cidr: "{{ ec2_vpc_net_list.0.cidr_block | ansible.utils.ipsubnet(25,1) }}"

        route53_resolver_list:
          - name: molecule-cloudflare
            direction: outbound
            ip_addresses:
              - SubnetId: "{{ _ec2_vpc_subnet_info_dict[ec2_vpc_subnet_list.0.subnets.0.name].id }}"
                Ip: 192.168.0.125
              - SubnetId: "{{ _ec2_vpc_subnet_info_dict[ec2_vpc_subnet_list.0.subnets.1.name].id }}"
                Ip: 192.168.0.253
            vpc_id: "{{ _ec2_vpc_net_info_dict[ec2_vpc_net_list.0.name].id }}"

          - name: molecule-google
            direction: outbound
            ip_addresses:
              - SubnetId: "{{ _ec2_vpc_subnet_info_dict[ec2_vpc_subnet_list.0.subnets.0.name].id }}"
                Ip: 192.168.0.126
              - SubnetId: "{{ _ec2_vpc_subnet_info_dict[ec2_vpc_subnet_list.0.subnets.1.name].id }}"
                Ip: 192.168.0.254
            rules:
              - cidr_ip: 192.168.0.0/24
                ports:
                  - 53
                proto: tcp
              - cidr_ip: 192.168.0.0/24
                ports:
                  - 53
                proto: udp
            rules_egress:
              - cidr_ip: 192.168.0.0/24
                proto: -1
            vpc_id: "{{ _ec2_vpc_net_info_dict[ec2_vpc_net_list.0.name].id }}"

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
