---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_vpc_net_info
    - ec2_vpc_subnet_info
    - route53_resolver_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _route53_resolver_info_dict['molecule-cloudflare'].Arn is defined
          - _route53_resolver_info_dict['molecule-cloudflare'].Direction == 'OUTBOUND'
          - _route53_resolver_info_dict['molecule-cloudflare'].Id is defined
          - _route53_resolver_info_dict['molecule-cloudflare'].IpAddressCount == 2
          - _route53_resolver_info_dict['molecule-cloudflare'].HostVPCId == route53_resolver_list.0.vpc_id
          - _route53_resolver_info_dict['molecule-cloudflare'].Protocols.0 == 'Do53'
          - _route53_resolver_info_dict['molecule-cloudflare'].ResolverEndpointType == 'IPV4'
          - _route53_resolver_info_dict['molecule-google'].Arn is defined
          - _route53_resolver_info_dict['molecule-google'].Direction == 'OUTBOUND'
          - _route53_resolver_info_dict['molecule-google'].Id is defined
          - _route53_resolver_info_dict['molecule-google'].IpAddressCount == 2
          - _route53_resolver_info_dict['molecule-google'].HostVPCId == route53_resolver_list.0.vpc_id
          - _route53_resolver_info_dict['molecule-google'].Protocols.0 == 'Do53'
          - _route53_resolver_info_dict['molecule-google'].ResolverEndpointType == 'IPV4'

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"
        route53_resolver_list:
          "{{ route53_resolver_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - route53_resolver
        - ec2_vpc_subnet
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
