---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_vpc_net_info
    - ec2_security_group_info
    - ec2_vpc_subnet_info

  tasks:
    - name: Ensure role is included without name
      ansible.builtin.include_role:
        name: route53_resolver_info
      vars:
        route53_resolver_info_filters: {}

    - name: Ensure info without name is verified
      ansible.builtin.assert:
        that:
          - _route53_resolver_info_dict['molecule-cloudflare'].arn is defined
          - _route53_resolver_info_dict['molecule-cloudflare'].direction == 'OUTBOUND'
          - _route53_resolver_info_dict['molecule-cloudflare'].id is defined
          - _route53_resolver_info_dict['molecule-cloudflare'].ip_address_count == 2
          - _route53_resolver_info_dict['molecule-cloudflare'].ip_addresses | length == 2
          - route53_resolver_list.0.ip_addresses.0.ip in
              (_route53_resolver_info_dict['molecule-cloudflare'].ip_addresses |
               map(attribute='ip') | list)
          - route53_resolver_list.0.ip_addresses.0.subnet_id in
              (_route53_resolver_info_dict['molecule-cloudflare'].ip_addresses |
               map(attribute='subnet_id') | list)
          - route53_resolver_list.0.ip_addresses.1.ip in
              (_route53_resolver_info_dict['molecule-cloudflare'].ip_addresses |
               map(attribute='ip') | list)
          - route53_resolver_list.0.ip_addresses.1.subnet_id in
              (_route53_resolver_info_dict['molecule-cloudflare'].ip_addresses |
               map(attribute='subnet_id') | list)
          - _route53_resolver_info_dict['molecule-cloudflare'].protocols.0 == 'Do53'
          - _route53_resolver_info_dict['molecule-cloudflare'].resolver_endpoint_type == 'IPV4'
          - _route53_resolver_info_dict['molecule-cloudflare'].security_group_ids.0 == _ec2_security_group_info_dict['molecule-route53resolver'].group_id
          - _route53_resolver_info_dict['molecule-google'].arn is defined
          - _route53_resolver_info_dict['molecule-google'].direction == 'OUTBOUND'
          - _route53_resolver_info_dict['molecule-google'].id is defined
          - _route53_resolver_info_dict['molecule-google'].ip_address_count == 2
          - _route53_resolver_info_dict['molecule-google'].ip_addresses | length == 2
          - route53_resolver_list.1.ip_addresses.0.ip in
              (_route53_resolver_info_dict['molecule-google'].ip_addresses |
               map(attribute='ip') | list)
          - route53_resolver_list.1.ip_addresses.0.subnet_id in
              (_route53_resolver_info_dict['molecule-google'].ip_addresses |
               map(attribute='subnet_id') | list)
          - route53_resolver_list.1.ip_addresses.1.ip in
              (_route53_resolver_info_dict['molecule-google'].ip_addresses |
               map(attribute='ip') | list)
          - route53_resolver_list.1.ip_addresses.1.subnet_id in
              (_route53_resolver_info_dict['molecule-google'].ip_addresses |
               map(attribute='subnet_id') | list)
          - _route53_resolver_info_dict['molecule-google'].protocols.0 == 'Do53'
          - _route53_resolver_info_dict['molecule-google'].resolver_endpoint_type == 'IPV4'
          - _route53_resolver_info_dict['molecule-google'].security_group_ids.0 == _ec2_security_group_info_dict['molecule-route53resolver'].group_id

    - name: Ensure role is included with name
      ansible.builtin.include_role:
        name: route53_resolver_info
      vars:
        route53_resolver_info_filters:
          Name: "{{ route53_resolver_list.0.name }}"

    - name: Ensure info with name is verified
      ansible.builtin.assert:
        that:
          - _route53_resolver_info_list | length == 1
          - _route53_resolver_info_dict[route53_resolver_list.0.name].arn is defined
          - _route53_resolver_info_dict[route53_resolver_list.0.name].direction == 'OUTBOUND'
          - _route53_resolver_info_dict[route53_resolver_list.0.name].id is defined
          - _route53_resolver_info_dict[route53_resolver_list.0.name].ip_address_count == 2
          - _route53_resolver_info_dict[route53_resolver_list.0.name].ip_addresses | length == 2
          - _route53_resolver_info_dict[route53_resolver_list.0.name].protocols.0 == 'Do53'
          - _route53_resolver_info_dict[route53_resolver_list.0.name].resolver_endpoint_type == 'IPV4'

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_security_group_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            security_groups:
              "{{ ec2_security_group_list.0.security_groups |
                  map('combine', {'state': 'absent'}) }}"
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"
        route53_resolver_list:
          "{{ route53_resolver_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - route53_resolver
        - ec2_security_group
        - ec2_vpc_subnet
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
