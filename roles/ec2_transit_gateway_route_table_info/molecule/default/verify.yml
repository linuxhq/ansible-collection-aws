---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_transit_gateway_info
    - ec2_transit_gateway_route_table_info
    - ec2_transit_gateway_vpc_attachment_info
    - ec2_vpc_net_info
    - ec2_vpc_subnet_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _ec2_transit_gateway_route_table_info_dict['molecule'].state == 'available'
          - _ec2_transit_gateway_route_table_info_dict['molecule'].transit_gateway_id ==
              _ec2_transit_gateway_info_dict['molecule'].transit_gateway_id
          - _ec2_transit_gateway_route_table_info_dict['molecule'].transit_gateway_route_table_id is defined
          - _ec2_transit_gateway_route_table_info_dict['molecule'].routes | length == 3
          - _ec2_transit_gateway_route_table_info_dict['molecule-rtb'].state == 'available'
          - _ec2_transit_gateway_route_table_info_dict['molecule-rtb'].transit_gateway_id ==
              _ec2_transit_gateway_info_dict['molecule'].transit_gateway_id
          - _ec2_transit_gateway_route_table_info_dict['molecule-rtb'].transit_gateway_route_table_id is defined
          - _ec2_transit_gateway_route_table_info_dict['molecule-rtb'].routes | length == 2

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_transit_gateway_route_table_list:
          - name: molecule
            transit_gateway_id:
              "{{ _ec2_transit_gateway_info_dict['molecule'].transit_gateway_id }}"
            routes:
              - destination_cidr_block: 192.168.0.0/24
                state: absent
              - destination_cidr_block: 192.168.1.0/24
                state: absent
          - "{{ ec2_transit_gateway_route_table_list.1 |
                combine({'state': 'absent'}) }}"

        ec2_transit_gateway_vpc_attachment_list:
          "{{ ec2_transit_gateway_vpc_attachment_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_transit_gateway_list:
          "{{ ec2_transit_gateway_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_subnet_list:
          "{{ ec2_vpc_subnet_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - ec2_transit_gateway_route_table
        - ec2_transit_gateway_vpc_attachment
        - ec2_transit_gateway
        - ec2_vpc_subnet
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
