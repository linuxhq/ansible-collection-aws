---
- name: Ensure aws route53 resolver endpoint is present
  tags:
    - route53_resolver
  ansible.builtin.command:
    cmd: >
      aws route53resolver create-resolver-endpoint
        --creator-request-id "{{ _route53resolver.name }}"
        --direction "{{ _route53resolver.direction | upper }}"
        --ip-addresses '{{ _route53resolver.ip_addresses | to_json }}'
        --name "{{ _route53resolver.name }}"
        --resolver-endpoint-type "{{ _route53resolver.resolver_endpoint_type | d('ipv4') | upper }}"
        --security-group-ids '{{ __route53_resolver_security_group_id | to_json }}'
  register: __route53_resolver_create
  when:
    - _route53resolver.name not in __route53_resolver_dict.keys()
    - _route53resolver.state == 'present'
  changed_when: true

- name: Ensure aws route53 resolver endpoint is operational
  tags:
    - route53_resolver
  ansible.builtin.command:
    cmd: >
      aws route53resolver get-resolver-endpoint
        --output text
        --query 'ResolverEndpoint.Status'
        --resolver-endpoint-id "{{ (__route53_resolver_create.stdout | from_json).ResolverEndpoint.Id }}"
  register: __route53_resolver_present
  when:
    - _route53resolver.name not in __route53_resolver_dict.keys()
    - _route53resolver.state == 'present'
    - not ansible_check_mode
  until:
    - __route53_resolver_present.stdout is defined
    - __route53_resolver_present.stdout == 'OPERATIONAL'
  delay: 5
  retries: 60
  changed_when: false

- name: Ensure aws route53 resolver endpoint is absent
  tags:
    - route53_resolver
  ansible.builtin.command:
    cmd: >
      aws route53resolver delete-resolver-endpoint
        --resolver-endpoint-id "{{ __route53_resolver_dict[_route53resolver.name] }}"
  when:
    - _route53resolver.name in __route53_resolver_dict.keys()
    - _route53resolver.state == 'absent'
  changed_when: true

- name: Ensure aws route53 resolver endpoint is deleted
  tags:
    - route53_resolver
  ansible.builtin.command:
    cmd: >
      aws route53resolver get-resolver-endpoint
        --output text
        --query 'ResolverEndpoint.Status'
        --resolver-endpoint-id "{{ __route53_resolver_dict[_route53resolver.name] }}"
  register: __route53_resolver_absent
  when:
    - _route53resolver.name in __route53_resolver_dict.keys()
    - _route53resolver.state == 'absent'
  until:
    - __route53_resolver_absent.rc == 255
  delay: 5
  retries: 60
  changed_when: false
  failed_when:
    - __route53_resolver_absent.rc != 255
...
