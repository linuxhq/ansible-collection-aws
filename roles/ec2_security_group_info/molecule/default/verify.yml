---
- name: Verify
  hosts: all
  environment:
    PATH: '/opt/awscli/bin'

  roles:
    - ec2_security_group_info
    - ec2_vpc_net_info

  post_tasks:
    - name: Ensure info is verified
      ansible.builtin.assert:
        that:
          - _ec2_security_group_info_dict['molecule-ftp'].group_id is defined
          - _ec2_security_group_info_dict['molecule-ssh'].group_id is defined
          - _ec2_security_group_info_dict['molecule-telnet'].group_id is defined
          - _ec2_security_group_info_dict['molecule-smtp'].group_id is defined
          - _ec2_security_group_info_dict['molecule-domain'].group_id is defined
          - _ec2_security_group_info_dict['molecule-http'].group_id is defined
          - _ec2_security_group_info_dict['molecule-pop3'].group_id is defined
          - _ec2_security_group_info_dict['molecule-imap'].group_id is defined
          - _ec2_security_group_info_dict['molecule-ldap'].group_id is defined
          - _ec2_security_group_info_dict['molecule-https'].group_id is defined
          - _ec2_security_group_info_dict['molecule-ircd'].group_id is defined
          - _ec2_security_group_info_dict['molecule-ircs'].group_id is defined
          - _ec2_security_group_info_dict['molecule-cluster'].group_id is defined

    - name: Ensure aws security group relationships are confirmed
      vars:
        __cluster: "{{ _ec2_security_group_info_dict['molecule-cluster'] }}"
        __cluster_self:
          "{{ __cluster.ip_permissions |
              selectattr('ip_protocol', 'eq', '-1') |
              list }}"
        __cluster_ssh:
          "{{ __cluster.ip_permissions |
              selectattr('ip_protocol', 'eq', 'tcp') |
              selectattr('from_port', 'defined') |
              selectattr('from_port', 'eq', 22) |
              selectattr('to_port', 'eq', 22) |
              list }}"
      ansible.builtin.assert:
        that:
          - __cluster.ip_permissions | length == 2
          - __cluster_self | length == 1
          - __cluster_self.0.user_id_group_pairs | map(attribute='group_id') |
            list == [__cluster.group_id]
          - __cluster_self.0.ip_ranges | d([]) | length == 0
          - __cluster_ssh | length == 1
          - __cluster_ssh.0.user_id_group_pairs | map(attribute='group_id') |
            list == [_ec2_security_group_info_dict['molecule-ssh'].group_id]
          - __cluster_ssh.0.ip_ranges | d([]) | length == 0

    - name: Ensure inventory lists are formatted
      ansible.builtin.set_fact:
        ec2_vpc_net_list:
          "{{ ec2_vpc_net_list |
              map('combine', {'state': 'absent'}) }}"
        ec2_security_group_list:
          - vpc_id: "{{ _ec2_vpc_net_info_dict['molecule'].id }}"
            security_groups:
              "{{ ec2_security_group_list.0.security_groups |
                  map('combine', {'state': 'absent'}) }}"

    - name: Ensure roles are included
      ansible.builtin.include_role:
        name: "{{ _verify }}"
      loop:
        - ec2_security_group
        - ec2_vpc_net
      loop_control:
        label: "{{ _verify }}"
        loop_var: _verify
...
