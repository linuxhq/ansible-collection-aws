---
dependency:
  name: galaxy
  options:
    requirements-file: ../../requirements.yml

driver:
  name: vagrant

platforms:
  - name: almalinux9
    box: bento/almalinux-9.6
    cpus: 4
    memory: 4096

provisioner:
  name: ansible
  env:
    ANSIBLE_ACTION_WARNINGS: false
    ANSIBLE_DEPRECATION_WARNINGS: false
  log: true
  options:
    diff: true
  inventory:
    group_vars:
      all:
        ansible_python_interpreter: /opt/awscli/bin/python
        ec2_vpc_net_list:
          - name: molecule-1
            cidr_block: 192.168.0.0/24
          - name: molecule-2
            cidr_block: 192.168.1.0/24
          - name: molecule-3
            cidr_block: 192.168.2.0/24

        route53_zone_associate_list:
          - hosted_zone_id: "{{ _route53_zone_info_dict[route53_zone_list.0.zone].id }}"
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule-2'].id }}"
            vpc_region:
              "{{ lookup('ansible.builtin.ini',
                         'region',
                         file='~/.aws/config',
                         section='profile molecule') }}"

          - hosted_zone_id: "{{ _route53_zone_info_dict[route53_zone_list.1.zone].id }}"
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule-2'].id }}"
            vpc_region:
              "{{ lookup('ansible.builtin.ini',
                         'region',
                         file='~/.aws/config',
                         section='profile molecule') }}"

          - hosted_zone_id: "{{ _route53_zone_info_dict[route53_zone_list.0.zone].id }}"
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule-3'].id }}"
            vpc_region:
              "{{ lookup('ansible.builtin.ini',
                         'region',
                         file='~/.aws/config',
                         section='profile molecule') }}"

          - hosted_zone_id: "{{ _route53_zone_info_dict[route53_zone_list.1.zone].id }}"
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule-3'].id }}"
            vpc_region:
              "{{ lookup('ansible.builtin.ini',
                         'region',
                         file='~/.aws/config',
                         section='profile molecule') }}"

        route53_zone_list:
          - zone: molecule-1.org
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule-1'].id }}"
            vpc_region:
              "{{ lookup('ansible.builtin.ini',
                         'region',
                         file='~/.aws/config',
                         section='profile molecule') }}"

          - zone: molecule-2.org
            vpc_id: "{{ _ec2_vpc_net_info_dict['molecule-1'].id }}"
            vpc_region:
              "{{ lookup('ansible.builtin.ini',
                         'region',
                         file='~/.aws/config',
                         section='profile molecule') }}"

scenario:
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - check
    - converge
    - check
    - idempotence
    - verify
    - cleanup
    - destroy

verifier:
  name: ansible
  options:
    diff: true
...
