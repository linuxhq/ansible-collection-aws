---
- name: Ensure aws virtual private cloud vpn gateways are managed
  tags:
    - ec2_vpc_vgw
  amazon.aws.ec2_vpc_vgw:
    asn: "{{ _vgw.asn | d(omit) }}"
    name: "{{ _vgw.name }}"
    purge_tags: "{{ _vgw.purge_tags | d(true) }}"
    state: "{{ _vgw.state | d('present') }}"
    tags: "{{ _vgw.tags | d({}) | combine({'Name': _vgw.name}) }}"
    type: "{{ _vgw.type | d('ipsec.1') }}"
    validate_certs: true
    vpc_id: "{{ _vgw.vpc_id }}"
    vpn_gateway_id: "{{ __ec2_vpc_vgw_dict[_vgw.name] | d(omit) }}"
    wait_timeout: "{{ _vgw.wait_timeout | d(300) }}"
  register: __ec2_vpc_vgw_result
  loop: "{{ __ec2_vpc_vgw_list }}"
  loop_control:
    label: "{{ _vgw.name | d(none) }}"
    loop_var: _vgw
  async: "{{ ansible_check_mode | ternary(0, ec2_vpc_vgw_async) }}"
  poll: "{{ ec2_vpc_vgw_poll }}"
  when:
    - _vgw.name is defined
    - _vgw.vpc_id is defined
  changed_when:
    - ansible_check_mode | bool
    - __ec2_vpc_vgw_result.changed | bool

- name: Ensure managed aws virtual private cloud vpn gateway jobs are complete
  tags:
    - ec2_vpc_vgw
  ansible.builtin.async_status:
    jid: "{{ _jid.ansible_job_id }}"
  register: __ec2_vpc_vgw_status
  loop: "{{ __ec2_vpc_vgw_result.results }}"
  loop_control:
    label: "{{ _jid._vgw.name | d(none) }}"
    loop_var: _jid
  delay: "{{ ec2_vpc_vgw_delay }}"
  retries: "{{ ec2_vpc_vgw_retries }}"
  when:
    - _jid.ansible_job_id is defined
  until:
    - __ec2_vpc_vgw_status.finished | bool
...
