---
breaking_changes:
  - rds_instance - the role no longer creates security groups; the per-item
    C(vpc_id), C(rules), and C(rules_egress) keys are removed. Manage groups
    with the ec2_security_group role and pass C(vpc_security_group_ids)
    instead.
minor_changes:
  - rds_instance - manage instances asynchronously in batches like the other
    manager roles.
  - rds_instance - add a role dependency on ec2_security_group_info.
