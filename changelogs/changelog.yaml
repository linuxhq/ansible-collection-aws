ancestor: null
releases:
  2.0.0:
    changes:
      minor_changes:
      - collection - add agent workflow rules for module and role authoring.
      - roles - add absent state support to the manager roles.
      - roles - add async support to applicable roles.
      - roles - add batch operation support to applicable roles.
      - roles - add molecule scenarios to all roles.
      release_summary: Initial release that includes a changelog.
    release_date: '2026-05-28'
  2.0.1:
    changes:
      minor_changes:
      - modules - align twenty-eight info modules with the collection authoring standards.
      - roles - align twelve info roles with the role authoring standards.
      release_summary: Standardization pass across the info modules and info roles.
    release_date: '2026-06-01'
  2.0.2:
    changes:
      minor_changes:
      - modules - align the account_region, acm_certificate_request, and ec2 manager
        modules with the collection authoring standards.
      release_summary: Bring the account, acm, and ec2 manager modules up to the collection
        standards.
    release_date: '2026-06-02'
  2.0.3:
    changes:
      minor_changes:
      - modules - align the eks, iam, notifications, pinpoint, route53, service quota,
        ses, sns, ssm, and wafv2 managers with the collection authoring standards,
        including botocore method checks.
      release_summary: Bring the remaining manager modules up to the collection standards.
    release_date: '2026-06-03'
  2.0.4:
    changes:
      minor_changes:
      - modules - follow-up standardization pass across the manager modules.
      release_summary: Follow-up standardization pass across the manager modules.
    release_date: '2026-06-04'
  2.0.5:
    changes:
      bugfixes:
      - sns_topic_attributes - fix check mode when the topic does not exist.
      minor_changes:
      - roles - sort defaults alphabetically and sync README sections.
      - splunk_addon - initial commit.
      release_summary: Addition of the splunk_addon role and a check mode fix in sns_topic_attributes.
    release_date: '2026-06-04'
  2.0.6:
    changes:
      minor_changes:
      - splunk_addon - update the IAM and KMS policies.
      release_summary: Update splunk_addon iam and kms policies.
    release_date: '2026-06-04'
  2.0.7:
    changes:
      minor_changes:
      - splunk_addon - update the KMS key principals.
      release_summary: Update splunk_addon kms key principals.
    release_date: '2026-06-05'
  2.0.8:
    changes:
      minor_changes:
      - plugins - update the license header on every module and lookup plugin.
      - roles - extend molecule scenarios with tagging tests.
      release_summary: License header cleanup across every plugin and molecule tagging
        coverage for the roles.
    release_date: '2026-06-13'
  2.0.9:
    changes:
      minor_changes:
      - modules - optimization pass across the ec2, eks, pinpoint, route53, ses, sns,
        and wafv2 modules.
      release_summary: Module optimization pass.
    release_date: '2026-06-19'
  2.1.0:
    changes:
      bugfixes:
      - wafv2_web_acl_info - normalize bytes and timestamp values in returned web
        ACLs so results serialize cleanly.
      release_summary: Bugfix for wafv2_web_acl_info result serialization.
    release_date: '2026-06-22'
  2.1.1:
    changes:
      minor_changes:
      - splunk_addon - add additional permissions to the role.
      release_summary: Additional permissions added to the splunk_addon role.
    release_date: '2026-06-25'
  2.1.2:
    changes:
      minor_changes:
      - elb_application_lb - add scheme support to the role.
      release_summary: Add scheme support to the elb_application_lb role.
    release_date: '2026-06-25'
  2.1.3:
    changes:
      minor_changes:
      - global_accelerator - initial commit of the manager and info roles.
      - modules - optimization pass across all modules.
      release_summary: Initial release of the global accelerator modules and roles,
        plus an optimization pass across all modules.
    modules:
    - description: Manage aws global accelerators
      name: global_accelerator
      namespace: ''
    - description: Gather information about aws global accelerators
      name: global_accelerator_info
      namespace: ''
    release_date: '2026-07-06'
  2.1.4:
    changes:
      minor_changes:
      - ec2_flow_log_info, ec2_instance_type_info, ec2_placement_group_info, ec2_pricing_info,
        ec2_serial_console_info, ec2_transit_gateway_route_table_info, ec2_vpc_prefix_list_info,
        ecs_ecr_info, eks_cluster_info, glue_connection_info, iam_account_alias_info,
        iam_policy_info, rds_subnet_group_info, route53_delegation_set_info, route53_resolver_rule_info,
        ses_identity_info, ses_identity_tokens_info, ses_sandbox_info, sns_sms_attributes_info,
        sqs_queue_info, ssm_association_info, ssm_document_info, ssm_instance_info,
        wafv2_ip_set_info, wafv2_web_acl_info - verify the required botocore client
        methods and parameters are available and fail with a clear message when the
        installed botocore is too old.
      - modules - refactor shared logic into module_utils helpers for SDK gating,
        paginated queries, waiters, and tag reconciliation.
      - notifications_hub, route53_zone_associate - rely on AWS to validate region
        names instead of a client-side pattern.
      - s3_bucket - support a per-bucket region override in the role.
      release_summary: Shared module_utils helpers, botocore support gating across
        all modules, and a region override for the s3_bucket role.
    fragments:
    - info-modules-sdk-method-checks.yml
    - release-summary.yml
    - s3-bucket-region-override.yml
    release_date: '2026-07-16'
  2.1.5:
    changes:
      breaking_changes:
      - rds_instance - the role no longer creates security groups; the per-item C(vpc_id),
        C(rules), and C(rules_egress) keys are removed. Manage groups with the ec2_security_group
        role and pass C(vpc_security_group_ids) instead.
      minor_changes:
      - ec2_security_group - create all groups before populating rules so rules can
        reference any group managed in the same run, including groups in later batches.
      - ec2_security_group - strip rules from groups being removed before deleting
        them so cross-referenced groups delete cleanly.
      - rds_instance - add a role dependency on ec2_security_group_info.
      - rds_instance - manage instances asynchronously in batches like the other manager
        roles.
      release_summary: This release reworks the rds_instance role to manage instances
        asynchronously in batches and drops its built-in security group management
        in favor of the ec2_security_group role, which now creates all groups before
        populating rules so rules can cross-reference any group managed in the same
        run. It also prunes unused Python dependencies and picks up the latest AWS
        SDK and toolchain updates.
    fragments:
    - ec2-security-group-two-phase.yml
    - rds-instance-security-groups.yml
    - release-summary.yml
    release_date: '2026-07-16'
  2.1.6:
    changes:
      breaking_changes:
      - efs - the role no longer creates security groups; the per-item C(vpc_id),
        C(rules), and C(rules_egress) keys are removed. Manage groups with the ec2_security_group
        role and set C(security_groups) on each target instead.
      - elb_application_lb - items always require C(name), C(listeners), and C(subnets),
        including when C(state=absent); append C(state) to the existing item instead
        of listing only the name.
      - elb_application_lb - the role no longer creates security groups; the per-item
        C(vpc_id), C(rules), and C(rules_egress) keys are removed. Manage groups with
        the ec2_security_group role and pass C(security_groups) instead.
      minor_changes:
      - efs - add a role dependency on ec2_security_group_info.
      - efs - manage filesystems asynchronously in batches like the other manager
        roles.
      - elb_application_lb - add a role dependency on ec2_security_group_info.
      - elb_application_lb - manage load balancers asynchronously in batches like
        the other manager roles.
      - elb_application_lb - the per-item C(wait) key now defaults to V(true) so deletions
        complete before dependent resources are removed.
      - rds_instance - support the per-item C(iam_roles) and C(purge_iam_roles) keys
        for associating IAM roles with an instance.
    fragments:
    - efs-security-groups.yml
    - elb-application-lb-security-groups.yml
    - rds-instance-iam-roles.yml
    release_date: '2026-07-22'
